<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Конструктор коврика для лодки: снимите размеры, получите чертёж и заявку.">
<style>html,body{margin:0}</style>
</head>
<body>
<title>Конструктор коврика для лодки</title>
<style>
  :root {
    --bg: #eaeff3;
    --surface: #ffffff;
    --surface-2: #f3f7fa;
    --ink: #0f1e2b;
    --ink-soft: #3f5162;
    --muted: #6b7f90;
    --line: #d3dde4;
    --line-strong: #b9c8d3;
    --accent: #0b6e8f;
    --accent-ink: #075169;
    --accent-soft: #e1f0f5;
    --active: #d9821a;
    --active-soft: #fbe9cf;
    --good: #2f8f5b;
    --good-soft: #e3f4ea;
    --danger: #c0392b;
    --danger-soft: #fbe8e5;
    --grid: rgba(11, 110, 143, 0.10);
    --shadow: 0 1px 2px rgba(15, 30, 43, 0.06), 0 8px 24px rgba(15, 30, 43, 0.06);
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c1620;
      --surface: #13222f;
      --surface-2: #0f1d29;
      --ink: #e8eef3;
      --ink-soft: #aebcc8;
      --muted: #7d909f;
      --line: #24384a;
      --line-strong: #32485c;
      --accent: #46b3d1;
      --accent-ink: #7fcde3;
      --accent-soft: #10303d;
      --active: #eaa53f;
      --active-soft: #3a2a12;
      --good: #4bbd82;
      --good-soft: #122c1f;
      --danger: #e07567;
      --danger-soft: #331915;
      --grid: rgba(70, 179, 209, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #eaeff3; --surface: #ffffff; --surface-2: #f3f7fa; --ink: #0f1e2b;
    --ink-soft: #3f5162; --muted: #6b7f90; --line: #d3dde4; --line-strong: #b9c8d3;
    --accent: #0b6e8f; --accent-ink: #075169; --accent-soft: #e1f0f5; --active: #d9821a;
    --active-soft: #fbe9cf; --good: #2f8f5b; --good-soft: #e3f4ea; --danger: #c0392b;
    --danger-soft: #fbe8e5; --grid: rgba(11,110,143,0.10);
    --shadow: 0 1px 2px rgba(15,30,43,0.06), 0 8px 24px rgba(15,30,43,0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0c1620; --surface: #13222f; --surface-2: #0f1d29; --ink: #e8eef3;
    --ink-soft: #aebcc8; --muted: #7d909f; --line: #24384a; --line-strong: #32485c;
    --accent: #46b3d1; --accent-ink: #7fcde3; --accent-soft: #10303d; --active: #eaa53f;
    --active-soft: #3a2a12; --good: #4bbd82; --good-soft: #122c1f; --danger: #e07567;
    --danger-soft: #331915; --grid: rgba(70,179,209,0.12);
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  #app {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { text-wrap: balance; margin: 0; }
  button { font-family: inherit; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 20px 40px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em; color: var(--accent-ink);
  }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
    background: var(--accent); color: #fff; font-size: 16px;
  }
  .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* progress */
  .progress { display: flex; gap: 6px; margin-bottom: 22px; }
  .progress .seg {
    height: 5px; flex: 1; border-radius: 99px; background: var(--line);
  }
  .progress .seg.done { background: var(--accent); }
  .progress .seg.active { background: var(--accent); opacity: 0.55; }

  .layout { display: grid; grid-template-columns: 1fr; gap: 26px; }
  @media (min-width: 940px) {
    .layout.two { grid-template-columns: minmax(0,1fr) 400px; }
  }

  /* form column */
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
  }
  .step-title { font-size: clamp(24px, 3vw, 30px); font-weight: 800; letter-spacing: -0.02em; }
  .lead { color: var(--ink-soft); font-size: 16px; margin: 14px 0 22px; max-width: 60ch; }

  .field { margin-bottom: 20px; }
  .field > label, .field-legend {
    display: block; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px;
  }
  .field .hint { font-size: 13.5px; color: var(--muted); margin: 0 0 8px; max-width: 56ch; }
  .field .opt { font-weight: 400; color: var(--muted); }

  .input-wrap { position: relative; }
  input[type="text"], input[type="tel"], textarea {
    width: 100%; font-family: var(--sans); font-size: 17px; color: var(--ink);
    background: var(--surface); border: 1.5px solid var(--line-strong);
    border-radius: var(--radius-sm); padding: 12px 14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .input-wrap input { padding-right: 46px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input.err, textarea.err { border-color: var(--danger); }
  input.err:focus { box-shadow: 0 0 0 3px var(--danger-soft); }
  .unit {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--muted); pointer-events: none; font-family: var(--sans);
  }
  .msg-err { color: var(--danger); font-size: 13.5px; margin: 6px 0 0; }
  .msg-warn {
    background: var(--active-soft); color: #8a5410; font-size: 13.5px;
    padding: 9px 12px; border-radius: 8px; margin: 8px 0 0;
  }
  @media (prefers-color-scheme: dark) { .msg-warn { color: var(--active); } }
  :root[data-theme="dark"] .msg-warn { color: var(--active); }
  :root[data-theme="light"] .msg-warn { color: #8a5410; }

  /* radio cards */
  .radio-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
  @media (min-width: 560px) { .radio-grid { grid-template-columns: 1fr 1fr; } }
  .radio-card {
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
    border: 2px solid var(--line); border-radius: var(--radius-sm); padding: 14px 16px;
    background: var(--surface); transition: border-color .15s, background .15s;
  }
  .radio-card:hover { border-color: var(--line-strong); }
  .radio-card.sel { border-color: var(--accent); background: var(--accent-soft); }
  .radio-card .rc-head { display: flex; align-items: center; gap: 9px; font-weight: 700; }
  .radio-card .rc-sub { font-size: 13.5px; color: var(--muted); }
  .radio-card input { accent-color: var(--accent); width: 17px; height: 17px; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 46px; padding: 0 22px; border-radius: var(--radius-sm); border: none;
    font-size: 15.5px; font-weight: 650; cursor: pointer; background: var(--accent); color: #fff;
    transition: filter .15s, opacity .15s;
  }
  .btn:hover { filter: brightness(1.07); }
  .btn:disabled { background: var(--line-strong); color: var(--surface); cursor: not-allowed; filter: none; }
  .btn-ghost {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    min-height: 42px; padding: 0 16px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--line-strong); background: var(--surface); color: var(--ink-soft);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--accent); color: var(--ink); }
  .btn-ghost.danger { color: var(--danger); border-color: var(--danger); }
  .btn-ghost.danger:hover { background: var(--danger-soft); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .btn-row.spread { justify-content: flex-start; }
  .btn-link {
    background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer;
    font-size: 14px; text-decoration: underline; text-underline-offset: 3px; padding: 6px 4px;
    min-height: 44px;
  }
  a.btn, a.btn-ghost { text-decoration: none; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* intro list */
  .intro-list { list-style: none; margin: 0 0 26px; padding: 0; display: grid; gap: 13px; }
  .intro-list li { display: flex; gap: 12px; align-items: flex-start; color: var(--ink-soft); }
  .intro-list .ic { font-size: 19px; line-height: 1.4; flex-shrink: 0; }

  /* station list */
  .stations { list-style: none; margin: 0 0 18px; padding: 0; display: grid; gap: 8px; }
  .station {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 10px 14px;
    background: var(--surface); transition: border-color .15s;
  }
  .station:hover { border-color: var(--accent); }
  .station .st-off { font-size: 13.5px; color: var(--muted); }
  .station .st-w {
    font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 700; font-size: 16px;
    color: var(--ink); background: none; border: none; cursor: pointer; padding: 8px 10px;
    border-radius: 7px; text-decoration: underline dotted; text-underline-offset: 4px; min-height: 44px;
  }
  .station .st-w:hover { background: var(--surface-2); }
  .station .st-edit { display: flex; gap: 8px; align-items: center; }
  .station .st-edit input { width: 92px; text-align: right; padding: 8px 10px; }

  .current-box {
    border: 2px solid var(--accent-soft); background: var(--surface-2);
    border-radius: var(--radius); padding: 16px 16px 18px; margin-bottom: 8px;
  }
  :root[data-theme="dark"] .current-box, .current-box { border-color: var(--line); }
  .current-box .field { margin-bottom: 14px; }

  .callout {
    border-radius: var(--radius); padding: 14px 16px; margin: 6px 0 16px; font-size: 14.5px;
  }
  .callout.warn { background: var(--active-soft); color: #7a4a0f; }
  :root[data-theme="dark"] .callout.warn { color: var(--active); }
  .callout.info { background: var(--accent-soft); color: var(--accent-ink); }
  .callout.good { background: var(--good-soft); color: var(--good); }
  .callout.confirm { background: var(--active-soft); border: 2px solid var(--active); color: var(--ink); }
  .callout.danger { background: var(--danger-soft); border: 2px solid var(--danger); color: var(--ink); }
  .callout.err-list { background: var(--danger-soft); }
  .callout.err-list p { margin: 3px 0; color: var(--danger); font-size: 13.5px; }

  .actions-footer { display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--line); padding-top: 18px; margin-top: 8px; }

  /* tables */
  .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 20px; }
  table { width: 100%; min-width: 420px; border-collapse: collapse; font-size: 14px; }
  caption { text-align: left; padding: 12px 16px 6px; font-weight: 600; color: var(--ink-soft); font-size: 14px; }
  thead th { text-align: left; font-weight: 600; color: var(--muted); background: var(--surface-2); padding: 10px 16px; }
  tbody td { padding: 10px 16px; border-top: 1px solid var(--line); }
  tbody tr:first-child td { border-top: none; }
  td.prod, .prod { color: var(--accent-ink); font-weight: 700; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  td.raw { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* summary */
  .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
  @media (min-width: 640px) { .summary { grid-template-columns: repeat(4, 1fr); } }
  .sum-cell { background: var(--surface-2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .sum-cell .k { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .sum-cell .v { font-size: 17px; font-weight: 700; margin-top: 3px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .sum-cell.accent .v { color: var(--accent-ink); }

  .consent {
    display: flex; gap: 12px; align-items: flex-start; cursor: pointer;
    border: 2px solid var(--line); border-radius: var(--radius); padding: 15px 16px; background: var(--surface);
    margin: 8px 0 4px;
  }
  .consent input { width: 20px; height: 20px; margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; }

  /* price */
  .price-card { border: 1px solid var(--line); background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 22px; box-shadow: var(--shadow); }
  .price-card .plabel { font-size: 13px; color: var(--muted); }
  .price-card .pval { font-size: 30px; font-weight: 800; font-family: var(--mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .price-card .pnote { margin-top: 10px; background: var(--accent-soft); color: var(--accent-ink); font-size: 13.5px; padding: 8px 12px; border-radius: 8px; }

  .export-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 6px 0 18px; }
  .draw-save { margin: 4px 0 18px; }
  .draw-save img { display: block; width: 100%; max-width: 340px; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
  .draw-save .hint { font-size: 13.5px; color: var(--muted); margin: 10px 0 0; max-width: 56ch; }
  details.order-text { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 6px 16px; }
  details.order-text summary { cursor: pointer; font-weight: 600; color: var(--ink-soft); padding: 10px 0; }
  details.order-text pre { white-space: pre-wrap; font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); overflow-x: auto; }

  /* blueprint preview */
  .blueprint { position: sticky; top: 18px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 16px; }
  .blueprint-title { text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .blueprint-frame {
    background-color: var(--surface-2);
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 22px 22px;
    border: 1px solid var(--line); border-radius: 10px; padding: 8px;
  }
  .blueprint-frame svg { display: block; width: 100%; height: auto; max-height: 68vh; }
  .empty-frame { min-height: 300px; display: grid; place-items: center; text-align: center; color: var(--muted); font-size: 14px; padding: 20px; }

  .review-blueprint { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 16px; margin-bottom: 4px; }
  .review-blueprint .blueprint-frame { max-width: 460px; margin: 0 auto; }
  .review-blueprint .blueprint-frame svg { max-height: 420px; }

  /* mobile preview */
  .mobile-preview { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; display: none; }
  .mobile-preview.on { display: block; }
  .mobile-preview-body {
    background: var(--surface); border-top: 1px solid var(--line);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.18); padding: 12px;
  }
  .mobile-preview-body .blueprint-frame svg { max-height: 44vh; }
  .mobile-toggle {
    width: 100%; min-height: 48px; border: none; border-top: 1px solid var(--accent-ink);
    background: var(--accent); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .mobile-spacer { height: 56px; }
  @media (min-width: 940px) { .mobile-spacer { display: none; } }

  .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>

<div id="app">
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="mark">⚓</span> Коврик для лодки</div>
      <div class="topbar-actions" id="topActions"></div>
    </div>
    <div class="progress" id="progress" hidden></div>
    <div class="layout" id="layout">
      <main class="form-col" id="stepPanel"></main>
      <aside class="preview-col" id="previewAside" hidden>
        <div class="blueprint">
          <div class="blueprint-title" id="previewTitle">Чертёж по вашим замерам</div>
          <div class="blueprint-frame" id="previewDesktop"></div>
        </div>
      </aside>
    </div>
  </div>
  <div class="mobile-spacer" id="mobileSpacer" hidden></div>
  <div class="mobile-preview" id="mobilePreview">
    <div class="mobile-preview-body" id="mobileBody" hidden><div class="blueprint-frame" id="previewMobile"></div></div>
    <button class="mobile-toggle" id="mobileToggle" aria-expanded="false">▲ Показать чертёж</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- domain: parse / format ----------
  function parseCm(raw) {
    if (raw == null) return null;
    var t = String(raw).trim().replace(",", ".");
    if (t === "") return null;
    if (!/^\d+(\.\d+)?$/.test(t)) return null;
    var v = Number(t);
    return Number.isFinite(v) ? v : null;
  }
  function fmt(v) {
    if (v == null) return "—";
    return Number.isInteger(v) ? String(v) : v.toFixed(1).replace(".", ",");
  }

  // ---------- domain: adjustments ----------
  var FLOOR = {
    rigid: { widthDeltaCm: 0, lengthDeltaCm: 0 },
    ndnd: { widthDeltaCm: 10, lengthDeltaCm: -3 }
  };
  function applyFloor(input, floor) {
    var a = FLOOR[floor];
    return {
      lengthCm: input.lengthCm + a.lengthDeltaCm,
      constantWidthCm: input.constantWidthCm + a.widthDeltaCm,
      bowStations: input.bowStations.map(function (s) {
        return { id: s.id, offsetFromBowCm: s.offsetFromBowCm, inputWidthCm: s.inputWidthCm,
                 productionWidthCm: s.inputWidthCm + a.widthDeltaCm };
      }),
      adjustments: { widthDeltaCm: a.widthDeltaCm, lengthDeltaCm: a.lengthDeltaCm }
    };
  }

  // ---------- domain: geometry ----------
  function buildProfile(lengthCm, constW, stations) {
    var sorted = stations.filter(function (s) { return s.offsetFromBowCm >= 0 && s.offsetFromBowCm <= lengthCm; })
      .slice().sort(function (a, b) { return a.offsetFromBowCm - b.offsetFromBowCm; });
    var profile = [];
    sorted.forEach(function (s) {
      var prev = profile[profile.length - 1];
      if (prev && prev.y === s.offsetFromBowCm) prev.w = s.widthCm;
      else profile.push({ y: s.offsetFromBowCm, w: s.widthCm });
    });
    if (profile.length === 0 || profile[profile.length - 1].y < lengthCm) {
      profile.push({ y: lengthCm, w: constW });
    }
    return profile;
  }
  function buildPolygon(profile) {
    var left = profile.map(function (p) { return { x: -p.w / 2, y: p.y }; });
    var right = profile.slice().reverse().map(function (p) { return { x: p.w / 2, y: p.y }; });
    return left.concat(right);
  }
  function shoelace(pts) {
    var s = 0;
    for (var i = 0; i < pts.length; i++) {
      var a = pts[i], b = pts[(i + 1) % pts.length];
      s += a.x * b.y - b.x * a.y;
    }
    return Math.abs(s) / 2;
  }
  function perim(pts) {
    var s = 0;
    for (var i = 0; i < pts.length; i++) {
      var a = pts[i], b = pts[(i + 1) % pts.length];
      s += Math.hypot(b.x - a.x, b.y - a.y);
    }
    return s;
  }
  function maxW(profile) { return profile.reduce(function (m, p) { return Math.max(m, p.w); }, 0); }
  function computeGeometry(lengthCm, constW, stations) {
    var profile = buildProfile(lengthCm, constW, stations);
    var poly = buildPolygon(profile);
    return { polygonPointsCm: poly, areaM2: shoelace(poly) / 10000, perimeterM: perim(poly) / 100, profile: profile };
  }

  // ---------- domain: validation ----------
  var LIMITS = { maxLengthCm: 800, minLengthCm: 50, maxWidthCm: 300, minWidthCm: 10 };
  function validateLength(v, floor) {
    if (v == null || !Number.isFinite(v)) return { level: "error", message: "Введите длину в сантиметрах, например 220" };
    if (v <= 0) return { level: "error", message: "Длина должна быть больше нуля" };
    if (v < LIMITS.minLengthCm) return { level: "error", message: "Слишком маленькая длина. Минимум " + LIMITS.minLengthCm + " см" };

      '<p class="lead">Измеряйте ширину пола поперёк лодки, двигаясь от верхней точки носа вниз с шагом ' + BOW_STEP + ' см. Когда ширина перестанет меняться — нажмите <strong>«Ширина дальше не меняется»</strong>.</p>';

    if (draft.bowWidths.length > 0) {
      html += '<ol class="stations">' + draft.bowWidths.map(function (w, i) {
        var off = i * BOW_STEP;
        var lbl = off === 0 ? "Верх носа (0 см)" : (off + " см от носа");
        if (ui.editingIndex === i) {
          return '<li class="station"><span class="st-off">' + lbl + '</span><span class="st-edit"><input id="edit-w" type="text" inputmode="decimal" value="' + esc(fmt(w)) + '" aria-label="Ширина на отступе ' + off + ' см"><button class="btn-ghost" data-act="saveEdit">ОК</button></span></li>';
        }
        return '<li class="station" data-off="' + off + '"><span class="st-off">' + lbl + '</span><button class="st-w" data-act="editStation" data-i="' + i + '">' + fmt(w) + ' см</button></li>';
      }).join("") + "</ol>";
    }

    var canFix = draft.bowWidths.length >= 2;
    if (!exhausted) {
      var warns = [];
      var cv = parseCm(ui.currentRaw);
      if (cv != null) warns = bowWarnings(cv, draft.bowWidths[draft.bowWidths.length - 1], draft.constantWidthCm);
      html += '<div class="current-box">' +
        field(nextOffset === 0 ? "Ширина верхней точки носа" : ("Ширина на расстоянии " + nextOffset + " см от носа"), "",
          "Измерьте внутреннюю ширину лодки поперёк на расстоянии " + nextOffset + " см от верхнего края носа",
          ui.currentErr,
          '<div class="input-wrap"><input id="bow-input" type="text" inputmode="decimal" value="' + esc(ui.currentRaw) + '" placeholder="' + (nextOffset === 0 ? "35" : "") + '" class="' + (ui.currentErr ? "err" : "") + '"><span class="unit">см</span></div>') +
        warns.map(function (w) { return '<p class="msg-warn">⚠️ ' + w + "</p>"; }).join("") +
        '<div class="btn-row" style="margin-top:12px"><button class="btn-ghost" data-act="addStation">Добавить замер</button>' +
        (canFix ? '<button class="btn" data-act="fixWidth">Ширина дальше не меняется</button>' : "") + "</div></div>";
    } else {
      html += '<div class="callout warn">Замеры достигли конца коврика. Нажмите «Ширина дальше не меняется», чтобы продолжить.<div style="margin-top:12px"><button class="btn" data-act="fixWidth">Ширина дальше не меняется</button></div></div>';
    }

    if (ui.confirmWidth != null) {
      html += '<div class="callout confirm"><p style="margin:0 0 10px">Последний замер — <strong>' + fmt(ui.confirmWidth) + ' см</strong>, но раньше вы указали ширину центральной части <strong>' + fmt(draft.constantWidthCm) + ' см</strong>.</p><div class="btn-row"><button class="btn" data-act="confirmWidthYes">Использовать ' + fmt(ui.confirmWidth) + ' см как постоянную ширину</button><button class="btn-ghost" data-act="confirmWidthNo">Вернуться и исправить</button></div></div>';
    }
    if (ui.confirmRestart) {
      html += '<div class="callout danger"><p style="margin:0 0 10px">Удалить все размеры и начать заново?</p><div class="btn-row"><button class="btn-ghost danger" data-act="restartYes">Да, начать заново</button><button class="btn-ghost" data-act="restartNo">Отмена</button></div></div>';
    }

    html += '<div class="actions-footer"><button class="btn-ghost" data-act="back1">Назад</button>' +
      (draft.bowWidths.length > 0 ? '<button class="btn-ghost" data-act="removeLast">Удалить последний замер</button>' : "") +
      '<button class="btn-ghost" data-act="restartAsk">Начать заново</button></div>';
    return html;
  }

  function renderFloor() {
    var floors = [
      ["rigid", "Жёсткое дно", "Размеры коврика равны вашим замерам"],
      ["ndnd", "НДНД", "+10 см к каждой ширине, −3 см к длине"]
    ];
    var input = currentInputDims();
    var prod = input && draft.floorType ? applyFloor(input, draft.floorType) : null;
    var html = '<div class="eyebrow">Шаг 3 из 5</div><h2 class="step-title">Тип дна и поправки</h2>' +
      '<p class="lead">Для надувного дна низкого давления (НДНД) коврик делается шире замеров на 10 см и короче на 3 см — так он ложится правильно. Для жёсткого дна размеры не меняются.</p>' +
      '<div class="field"><div class="radio-grid">' +
      floors.map(function (f) {
        return '<label class="radio-card ' + (draft.floorType === f[0] ? "sel" : "") + '"><span class="rc-head"><input type="radio" name="floor3" value="' + f[0] + '" ' + (draft.floorType === f[0] ? "checked" : "") + '>' + f[1] + '</span><span class="rc-sub">' + f[2] + '</span></label>';
      }).join("") + "</div></div>";
    if (input && prod) {
      html += '<div class="table-scroll"><table><thead><tr><th>Параметр</th><th>Размеры лодки</th><th>Размеры коврика</th></tr></thead><tbody>' +
        row("Общая длина", fmt(input.lengthCm) + " см", fmt(prod.lengthCm) + " см") +
        row("Постоянная ширина", fmt(input.constantWidthCm) + " см", fmt(prod.constantWidthCm) + " см") +
        prod.bowStations.map(function (s) { return row("Нос, " + fmt(s.offsetFromBowCm) + " см", fmt(s.inputWidthCm) + " см", fmt(s.productionWidthCm) + " см"); }).join("") +
        "</tbody></table></div>";
    }
    html += '<div class="actions-footer"><button class="btn-ghost" data-act="back2">Назад</button><button class="btn" data-act="toReview" ' + (draft.floorType ? "" : "disabled") + '>Дальше: проверка чертежа →</button></div>';
    return html;
  }
  function row(k, a, b) { return "<tr><td>" + k + '</td><td class="raw">' + a + '</td><td class="prod">' + b + "</td></tr>"; }

  function renderReview() {
    var o = buildOrder();
    if (!o) return '<div class="eyebrow">Шаг 4 из 5</div><h2 class="step-title">Проверка чертежа</h2><p class="lead">Не хватает данных. Вернитесь к предыдущим шагам.</p><div class="actions-footer"><button class="btn-ghost" data-act="back3">Назад</button></div>';
    var prodStations = o.prod.bowStations.map(function (s) { return { offsetFromBowCm: s.offsetFromBowCm, widthCm: s.productionWidthCm }; });
    var prodProfile = buildProfile(o.prod.lengthCm, o.prod.constantWidthCm, prodStations);
    var inputProfile = buildProfile(o.input.lengthCm, o.input.constantWidthCm, o.input.bowStations.map(function (s) { return { offsetFromBowCm: s.offsetFromBowCm, widthCm: s.inputWidthCm }; }));
    var warns = [];
    for (var i = 1; i < o.input.bowStations.length; i++) {
      if (o.input.bowStations[i].inputWidthCm < o.input.bowStations[i - 1].inputWidthCm)
        warns.push("Ширина на отступе " + fmt(o.input.bowStations[i].offsetFromBowCm) + " см меньше предыдущей — проверьте замер");
    }
    var floorLabel = draft.floorType === "ndnd" ? "НДНД" : "Жёсткое дно";
    var adjLabel = draft.floorType === "ndnd" ? ("ширина +" + o.prod.adjustments.widthDeltaCm + " см, длина " + o.prod.adjustments.lengthDeltaCm + " см") : "без поправок";

    var svg = renderSvg(o.prod.lengthCm, o.prod.constantWidthCm, prodStations, null, false);
    var html = '<div class="eyebrow">Шаг 4 из 5</div><h2 class="step-title">Проверка чертежа</h2><div style="height:16px"></div>' +
      '<div class="review-blueprint"><div class="blueprint-title">Итоговый производственный контур</div><div class="blueprint-frame">' + svg + '</div></div>' +
      '<div class="summary">' +
        sumCell("Длина лодки", fmt(o.input.lengthCm) + " см") +
        sumCell("Длина коврика", fmt(o.prod.lengthCm) + " см", true) +
        sumCell("Макс. ширина лодки", fmt(maxW(inputProfile)) + " см") +
        sumCell("Макс. ширина коврика", fmt(maxW(prodProfile)) + " см", true) +
        sumCell("Площадь", o.geo.areaM2.toFixed(2) + " м²") +
        sumCell("Периметр", o.geo.perimeterM.toFixed(2) + " м") +
        sumCell("Тип дна", floorLabel) +
        sumCell("Поправки", adjLabel) +
      "</div>" +
      '<div class="table-scroll"><table><caption>Станции замеров (расстояние от носа)</caption><thead><tr><th>От носа</th><th>Замер лодки</th><th>Коврик</th></tr></thead><tbody>' +
        o.prod.bowStations.map(function (s) { return row(fmt(s.offsetFromBowCm) + " см", fmt(s.inputWidthCm) + " см", fmt(s.productionWidthCm) + " см"); }).join("") +
        row("далее до " + fmt(o.prod.lengthCm) + " см", fmt(o.input.constantWidthCm) + " см", fmt(o.prod.constantWidthCm) + " см") +
      "</tbody></table></div>";
    if (warns.length) html += '<div class="callout warn">' + warns.map(function (w) { return "⚠️ " + w; }).join("<br>") + "</div>";
    html += '<div class="btn-row" style="margin-bottom:16px"><button class="btn-ghost" data-act="edit1">Изменить основные размеры</button><button class="btn-ghost" data-act="edit2">Изменить замеры носа</button><button class="btn-ghost" data-act="edit3">Изменить тип дна</button></div>';
    html += '<label class="consent"><input type="checkbox" id="consent" ' + (draft.dimensionsConfirmed ? "checked" : "") + '><span>Я проверил размеры и понимаю, что изделие будет изготовлено по указанным значениям</span></label>';
    html += '<div class="actions-footer"><button class="btn-ghost" data-act="back3">Назад</button><button class="btn" data-act="toOrder" ' + (draft.dimensionsConfirmed ? "" : "disabled") + '>Дальше: стоимость и заказ →</button></div>';
    return html;
  }
  function sumCell(k, v, accent) { return '<div class="sum-cell ' + (accent ? "accent" : "") + '"><div class="k">' + k + '</div><div class="v">' + v + "</div></div>"; }

  function renderOrder() {
    var o = buildOrder();
    if (!o) return '<div class="eyebrow">Шаг 5 из 5</div><h2 class="step-title">Стоимость и заказ</h2><p class="lead">Не хватает данных.</p><div class="actions-footer"><button class="btn-ghost" data-act="back4">Назад</button></div>';

    if (ui.orderNumber) {
      var txt = orderText(o);
      var fname = "kovrik-" + (ui.orderNumber || o.id);
      var svgHref = dataUri("image/svg+xml", exportSvgFile(o));
      var jsonHref = dataUri("application/json", orderJson(o));
      return '<h2 class="step-title">Заявка оформлена ✅</h2><div style="height:14px"></div>' +
        '<div class="callout good"><p style="margin:0 0 4px;font-size:16px">Номер вашей заявки: <strong class="num">' + esc(ui.orderNumber) + '</strong></p><p style="margin:0">Отправьте заявку производителю: скопируйте текст заявки и сохраните чертёж-картинку.</p></div>' +
        '<div class="export-actions"><button class="btn" data-act="copyText">📋 Скопировать текст заявки</button>' +
        '<button class="btn-ghost" data-act="copyJson">Скопировать данные (JSON)</button></div>' +
        '<div class="draw-save"><img id="orderImg" alt="Чертёж коврика ' + esc(ui.orderNumber) + '"><p class="hint">Чертёж коврика. Чтобы сохранить: на телефоне — <strong>долгое нажатие</strong> на картинку → «Сохранить», на компьютере — <strong>правой кнопкой</strong> → «Сохранить изображение». Или отправьте скриншотом.</p></div>' +
        '<details class="order-text"><summary>Текст заявки (нажмите, чтобы посмотреть)</summary><pre>' + esc(txt) + '</pre></details>' +
        '<details class="order-text"><summary>Скачать файлы (если ваш браузер разрешит)</summary><div class="btn-row" style="padding:8px 0"><a class="btn-ghost" download="' + fname + '.svg" href="' + svgHref + '">Файл SVG</a><a class="btn-ghost" download="' + fname + '.json" href="' + jsonHref + '">Файл JSON</a></div></details>' +
        '<div class="actions-footer"><button class="btn-ghost" data-act="newOrder">Новый расчёт</button></div>';
    }

    var price = o.pricing.preliminaryPrice;
    var readiness = orderReadiness(draft);
    var priceHtml = price != null
      ? '<div class="plabel">Предварительная стоимость</div><div class="pval">' + price.toLocaleString("ru-RU") + ' ₽</div><div class="pnote">Предварительная цена. Окончательная — после проверки чертежа менеджером.</div>'
      : '<p style="margin:0;color:var(--ink-soft)">💬 Стоимость рассчитает менеджер после получения заявки. Все размеры и чертёж прикрепляются автоматически.</p>';

    var html = '<div class="eyebrow">Шаг 5 из 5</div><h2 class="step-title">Стоимость и заказ</h2><div style="height:16px"></div>' +
      '<div class="price-card">' + priceHtml + "</div>" +
      '<h3 style="font-size:18px;margin-bottom:14px">Ваши контакты</h3>' +
      field("Имя", "", null, ui.contactErr.name ? { message: ui.contactErr.name } : null,
        '<input id="c-name" type="text" value="' + esc(draft.customer.name) + '" class="' + (ui.contactErr.name ? "err" : "") + '" autocomplete="name">') +
      field("Телефон", "", null, ui.contactErr.phone ? { message: ui.contactErr.phone } : null,
        '<input id="c-phone" type="tel" inputmode="tel" value="' + esc(draft.customer.phone) + '" placeholder="+7 900 000-00-00" class="' + (ui.contactErr.phone ? "err" : "") + '" autocomplete="tel">') +
      field("Комментарий", '<span class="opt">(необязательно)</span>', null, null,
        '<textarea id="c-comment" rows="3">' + esc(draft.customer.comment || "") + "</textarea>");
    if (!readiness.ready) {
      html += '<div class="callout err-list">' + readiness.problems.map(function (p) { return "<p>• " + p + "</p>"; }).join("") + "</div>";
    }
    html += '<div class="actions-footer"><button class="btn-ghost" data-act="back4">Назад</button><button class="btn" data-act="submit" ' + (readiness.ready ? "" : "disabled") + '>Заказать</button></div>';
    return html;
  }

  // ---------- main render ----------
  function render() {
    // progress
    var prog = $("progress");
    if (draft.step >= 1 && draft.step <= 5) {
      prog.hidden = false;
      prog.innerHTML = [1, 2, 3, 4, 5].map(function (n) {
        var cls = n < draft.step ? "done" : (n === draft.step ? "active" : "");
        return '<div class="seg ' + cls + '"></div>';
      }).join("");
    } else prog.hidden = true;

    // top actions
    var hasData = draft.step > 0 || draft.lengthCm != null;
    $("topActions").innerHTML = hasData ? '<button class="btn-ghost" data-act="resetAsk">Очистить расчёт</button>' : "";

    // step panel
    var panel = $("stepPanel");
    var confirmReset = ui.confirmReset ? '<div class="callout danger"><p style="margin:0 0 10px">Удалить все введённые размеры и начать заново?</p><div class="btn-row"><button class="btn-ghost danger" data-act="resetYes">Да, очистить</button><button class="btn-ghost" data-act="resetNo">Отмена</button></div></div>' : "";
    var body;
    if (draft.step === 0) body = renderIntro();
    else if (draft.step === 1) body = renderBasic();
    else if (draft.step === 2) body = renderBow();
    else if (draft.step === 3) body = renderFloor();
    else if (draft.step === 4) body = renderReview();
    else body = renderOrder();
    panel.innerHTML = confirmReset + body;

    // layout / preview visibility
    var showPreview = draft.step >= 1 && draft.step <= 3;
    var layout = $("layout"), aside = $("previewAside"), mobile = $("mobilePreview"), spacer = $("mobileSpacer");
    if (showPreview) {
      layout.classList.add("two"); aside.hidden = false; mobile.classList.add("on"); spacer.hidden = false;
    } else {
      layout.classList.remove("two"); aside.hidden = true; mobile.classList.remove("on"); spacer.hidden = true;
      $("mobileBody").hidden = true; $("mobileToggle").textContent = "▲ Показать чертёж"; $("mobileToggle").setAttribute("aria-expanded", "false");
    }
    renderPreview();
    wire();
  }

  // ---------- event wiring ----------
  function wire() {
    // live basic fields
    var fn = $("f-name"); if (fn) fn.addEventListener("input", function () { draft.boatName = fn.value; save(); });
    var fl = $("f-length"); if (fl) fl.addEventListener("input", function () { var v = parseCm(fl.value); if (v != null && !validateLength(v, draft.floorType)) { draft.lengthCm = v; save(); renderPreview(); } });
    var fw = $("f-width"); if (fw) fw.addEventListener("input", function () { var v = parseCm(fw.value); if (v != null && !validateWidth(v)) { draft.constantWidthCm = v; save(); renderPreview(); } });
    var fnFocus = function (h) { return function () { ui.highlight = h; renderPreview(); }; };
    var fnBlur = function () { ui.highlight = null; renderPreview(); };
    if (fl) { fl.addEventListener("focus", fnFocus({ type: "length" })); fl.addEventListener("blur", fnBlur); }
    if (fw) { fw.addEventListener("focus", fnFocus({ type: "constantWidth" })); fw.addEventListener("blur", fnBlur); }

    // bow input live warnings + preview highlight
    var bi = $("bow-input");
    if (bi) {
      var nextOffset = draft.bowWidths.length * BOW_STEP;
      ui.highlight = { type: "station", offsetCm: nextOffset };
      bi.addEventListener("input", function () {
        ui.currentRaw = bi.value; ui.currentErr = null;
        // update warnings inline without full re-render
        var box = bi.closest(".current-box");
        if (box) {
          box.querySelectorAll(".msg-warn").forEach(function (n) { n.remove(); });
          var v = parseCm(bi.value);
          if (v != null) {
            var warns = bowWarnings(v, draft.bowWidths[draft.bowWidths.length - 1], draft.constantWidthCm);
            var anchor = bi.closest(".field");
            warns.forEach(function (w) { var p = document.createElement("p"); p.className = "msg-warn"; p.textContent = "⚠️ " + w; anchor.after(p); });
          }
        }
      });
      bi.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); doAddStation(); } });
      // focus & preview
      renderPreview();
      setTimeout(function () { bi.focus(); var l = bi.value.length; try { bi.setSelectionRange(l, l); } catch (e) {} }, 0);
    }

    var ei = $("edit-w");
    if (ei) { setTimeout(function () { ei.focus(); ei.select(); }, 0); ei.addEventListener("keydown", function (e) { if (e.key === "Enter") doSaveEdit(); }); }

    // contact live
    var cn = $("c-name"); if (cn) cn.addEventListener("input", function () { draft.customer.name = cn.value; save(); });
    var cp = $("c-phone"); if (cp) cp.addEventListener("input", function () { draft.customer.phone = cp.value; save(); });
    var cc = $("c-comment"); if (cc) cc.addEventListener("input", function () { draft.customer.comment = cc.value; save(); });

    // radios
    document.querySelectorAll('input[name="floor"], input[name="floor3"]').forEach(function (r) {
      r.addEventListener("change", function () { draft.floorType = r.value; save(); render(); });
    });
    var consent = $("consent"); if (consent) consent.addEventListener("change", function () { draft.dimensionsConfirmed = consent.checked; save(); render(); });

    // station hover highlight
    document.querySelectorAll(".station[data-off]").forEach(function (li) {
      li.addEventListener("mouseenter", function () { ui.highlight = { type: "station", offsetCm: Number(li.dataset.off) }; renderPreview(); });
      li.addEventListener("mouseleave", function () { ui.highlight = null; renderPreview(); });
    });

    // чертёж на экране подтверждения как сохраняемая картинка
    var orderImg = $("orderImg");
    if (orderImg) { var oo = buildOrder(); if (oo) renderPngInto(orderImg, exportSvgFile(oo)); }
  }

  // ---------- actions ----------
  function doAddStation() {
    var bi = $("bow-input"); if (!bi) return;
    var v = parseCm(bi.value);
    if (v == null) { ui.currentErr = { message: "Введите ширину в сантиметрах, например 50" }; ui.currentRaw = bi.value; render(); return; }
    var iss = validateWidth(v);
    if (iss) { ui.currentErr = iss; ui.currentRaw = bi.value; render(); return; }
    var nextOffset = draft.bowWidths.length * BOW_STEP;
    if (draft.lengthCm && nextOffset >= draft.lengthCm) { ui.currentErr = { message: "Носовые замеры достигли длины коврика. Нажмите «Ширина дальше не меняется»." }; render(); return; }
    draft.bowWidths.push(v); ui.currentRaw = ""; ui.currentErr = null; save(); render();
  }
  function doFixWidth() {
    var last = draft.bowWidths[draft.bowWidths.length - 1];
    if (last == null) return;
    if (draft.constantWidthCm != null && last !== draft.constantWidthCm) { ui.confirmWidth = last; render(); return; }
    draft.constantWidthFixed = true; draft.constantWidthCm = last; save(); goStep(3);
  }
  function doSaveEdit() {
    var ei = $("edit-w"); if (!ei || ui.editingIndex == null) return;
    var v = parseCm(ei.value);
    if (v == null || validateWidth(v)) { ui.editingIndex = null; render(); return; }
    draft.bowWidths[ui.editingIndex] = v; ui.editingIndex = null; save(); render();
  }

  document.getElementById("app").addEventListener("click", function (e) {
    var t = e.target.closest("[data-act]"); if (!t) return;
    var act = t.dataset.act;
    switch (act) {
      case "start": goStep(1); break;
      case "back0": goStep(0); break;
      case "toBow":
        ui.submitAttempted = true;
        if (validateLength(draft.lengthCm, draft.floorType) || validateWidth(draft.constantWidthCm) || !draft.floorType) { render(); return; }
        ui.submitAttempted = false; goStep(2); break;
      case "back1": goStep(1); break;
      case "addStation": doAddStation(); break;
      case "fixWidth": doFixWidth(); break;
      case "confirmWidthYes": draft.constantWidthFixed = true; draft.constantWidthCm = ui.confirmWidth; ui.confirmWidth = null; save(); goStep(3); break;
      case "confirmWidthNo": ui.confirmWidth = null; render(); break;
      case "editStation": ui.editingIndex = Number(t.dataset.i); render(); break;
      case "saveEdit": doSaveEdit(); break;
      case "removeLast": draft.bowWidths.pop(); ui.currentErr = null; save(); render(); break;
      case "restartAsk": ui.confirmRestart = true; render(); break;
      case "restartYes": resetAll(); break;
      case "restartNo": ui.confirmRestart = false; render(); break;
      case "back2": goStep(2); break;
      case "toReview": if (draft.floorType) goStep(4); break;
      case "back3": goStep(3); break;
      case "edit1": goStep(1); break;
      case "edit2": goStep(2); break;
      case "edit3": goStep(3); break;
      case "toOrder": if (draft.dimensionsConfirmed) goStep(5); break;
      case "back4": goStep(4); break;
      case "submit": doSubmit(); break;
      case "copyText": { var oc = buildOrder(); if (oc) doCopy(t, orderText(oc), "📋 Скопировать текст заявки"); break; }
      case "copyJson": { var oj = buildOrder(); if (oj) doCopy(t, orderJson(oj), "Скопировать данные (JSON)"); break; }
      case "newOrder": resetAll(); break;
      case "resetAsk": ui.confirmReset = true; render(); break;
      case "resetYes": resetAll(); break;
      case "resetNo": ui.confirmReset = false; render(); break;
    }
  });

  function doSubmit() {
    var errors = {};
    if (draft.customer.name.trim() === "") errors.name = "Укажите имя";
    if (draft.customer.phone.trim() === "") errors.phone = "Укажите телефон";
    ui.contactErr = errors;
    var readiness = orderReadiness(draft);
    if (Object.keys(errors).length > 0 || !readiness.ready) { render(); return; }
    // защита от повторной отправки: номер присваивается один раз
    var key = "boat-mat-submitted";
    var submitted = {};
    try { submitted = JSON.parse(localStorage.getItem(key) || "{}"); } catch (e) {}
    if (submitted[draft.id]) ui.orderNumber = submitted[draft.id];
    else { ui.orderNumber = "BM-" + Date.now().toString(36).toUpperCase(); submitted[draft.id] = ui.orderNumber; try { localStorage.setItem(key, JSON.stringify(submitted)); } catch (e) {} }
    render();
  }
  function doCopy(btn, text, label) {
    function done() { btn.textContent = "✓ Скопировано"; setTimeout(function () { btn.textContent = label; }, 2000); }
    function fallback() {
      // резервный способ, если Clipboard API недоступен (напр. без https)
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      ta.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else fallback();
  }

  // warn before leaving with unfinished data
  window.addEventListener("beforeunload", function (e) {
    if (draft.step > 0 && draft.step < 5 && !ui.orderNumber && (draft.lengthCm != null || draft.bowWidths.length > 0)) {
      e.preventDefault(); e.returnValue = "";
    }
  });

  render();
})();
</script>
</body>
</html>
