<body>
<style>
  :root {
    --bg: #eaeff3;
    --surface: #ffffff;
    --surface-2: #f3f7fa;
    --ink: #0f1e2b;
    --ink-soft: #3f5162;
    --muted: #6b7f90;
    --line: #d3dde4;
    --line-strong: #b9c8d3;
    --accent: #0b6e8f;
    --accent-ink: #075169;
    --accent-soft: #e1f0f5;
    --active: #d9821a;
    --active-soft: #fbe9cf;
    --good: #2f8f5b;
    --good-soft: #e3f4ea;
    --danger: #c0392b;
    --danger-soft: #fbe8e5;
    --grid: rgba(11, 110, 143, 0.10);
    --shadow: 0 1px 2px rgba(15, 30, 43, 0.06), 0 8px 24px rgba(15, 30, 43, 0.06);
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --radius: 14px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c1620;
      --surface: #13222f;
      --surface-2: #0f1d29;
      --ink: #e8eef3;
      --ink-soft: #aebcc8;
      --muted: #7d909f;
      --line: #24384a;
      --line-strong: #32485c;
      --accent: #46b3d1;
      --accent-ink: #7fcde3;
      --accent-soft: #10303d;
      --active: #eaa53f;
      --active-soft: #3a2a12;
      --good: #4bbd82;
      --good-soft: #122c1f;
      --danger: #e07567;
      --danger-soft: #331915;
      --grid: rgba(70, 179, 209, 0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #eaeff3; --surface: #ffffff; --surface-2: #f3f7fa; --ink: #0f1e2b;
    --ink-soft: #3f5162; --muted: #6b7f90; --line: #d3dde4; --line-strong: #b9c8d3;
    --accent: #0b6e8f; --accent-ink: #075169; --accent-soft: #e1f0f5; --active: #d9821a;
    --active-soft: #fbe9cf; --good: #2f8f5b; --good-soft: #e3f4ea; --danger: #c0392b;
    --danger-soft: #fbe8e5; --grid: rgba(11,110,143,0.10);
    --shadow: 0 1px 2px rgba(15,30,43,0.06), 0 8px 24px rgba(15,30,43,0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0c1620; --surface: #13222f; --surface-2: #0f1d29; --ink: #e8eef3;
    --ink-soft: #aebcc8; --muted: #7d909f; --line: #24384a; --line-strong: #32485c;
    --accent: #46b3d1; --accent-ink: #7fcde3; --accent-soft: #10303d; --active: #eaa53f;
    --active-soft: #3a2a12; --good: #4bbd82; --good-soft: #122c1f; --danger: #e07567;
    --danger-soft: #331915; --grid: rgba(70,179,209,0.12);
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  body { margin: 0; }
  #app {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { text-wrap: balance; margin: 0; }
  button { font-family: inherit; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 20px 40px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin-bottom: 18px;
  }
  .brand {
    display: flex; align-items: center; gap: 9px;
    font-weight: 700; font-size: 18px; letter-spacing: -0.01em; color: var(--accent-ink);
  }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
    background: var(--accent); color: #fff; font-size: 16px;
  }
  .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* progress */
  .progress { display: flex; gap: 6px; margin-bottom: 22px; }
  .progress .seg {
    height: 5px; flex: 1; border-radius: 99px; background: var(--line);
  }
  .progress .seg.done { background: var(--accent); }
  .progress .seg.active { background: var(--accent); opacity: 0.55; }

  .layout { display: grid; grid-template-columns: 1fr; gap: 26px; }
  @media (min-width: 940px) {
    .layout.two { grid-template-columns: minmax(0,1fr) 400px; }
  }

  /* form column */
  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
  }
  .step-title { font-size: clamp(24px, 3vw, 30px); font-weight: 800; letter-spacing: -0.02em; }
  .lead { color: var(--ink-soft); font-size: 16px; margin: 14px 0 22px; max-width: 60ch; }

  .field { margin-bottom: 20px; }
  .field > label, .field-legend {
    display: block; font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 6px;
  }
  .field .hint { font-size: 13.5px; color: var(--muted); margin: 0 0 8px; max-width: 56ch; }
  .field .opt { font-weight: 400; color: var(--muted); }

  .input-wrap { position: relative; }
  input[type="text"], input[type="tel"], textarea {
    width: 100%; font-family: var(--sans); font-size: 17px; color: var(--ink);
    background: var(--surface); border: 1.5px solid var(--line-strong);
    border-radius: var(--radius-sm); padding: 12px 14px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .input-wrap input { padding-right: 46px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input.err, textarea.err { border-color: var(--danger); }
  input.err:focus { box-shadow: 0 0 0 3px var(--danger-soft); }
  .unit {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: var(--muted); pointer-events: none; font-family: var(--sans);
  }
  .msg-err { color: var(--danger); font-size: 13.5px; margin: 6px 0 0; }
  .msg-warn {
    background: var(--active-soft); color: #8a5410; font-size: 13.5px;
    padding: 9px 12px; border-radius: 8px; margin: 8px 0 0;
  }
  @media (prefers-color-scheme: dark) { .msg-warn { color: var(--active); } }
  :root[data-theme="dark"] .msg-warn { color: var(--active); }
  :root[data-theme="light"] .msg-warn { color: #8a5410; }

  /* radio cards */
  .radio-grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
  @media (min-width: 560px) { .radio-grid { grid-template-columns: 1fr 1fr; } }
  .radio-card {
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
    border: 2px solid var(--line); border-radius: var(--radius-sm); padding: 14px 16px;
    background: var(--surface); transition: border-color .15s, background .15s;
  }
  .radio-card:hover { border-color: var(--line-strong); }
  .radio-card.sel { border-color: var(--accent); background: var(--accent-soft); }
  .radio-card .rc-head { display: flex; align-items: center; gap: 9px; font-weight: 700; }
  .radio-card .rc-sub { font-size: 13.5px; color: var(--muted); }
  .radio-card input { accent-color: var(--accent); width: 17px; height: 17px; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 46px; padding: 0 22px; border-radius: var(--radius-sm); border: none;
    font-size: 15.5px; font-weight: 650; cursor: pointer; background: var(--accent); color: #fff;
    transition: filter .15s, opacity .15s;
  }
  .btn:hover { filter: brightness(1.07); }
  .btn:disabled { background: var(--line-strong); color: var(--surface); cursor: not-allowed; filter: none; }
  .btn-ghost {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    min-height: 42px; padding: 0 16px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--line-strong); background: var(--surface); color: var(--ink-soft);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--accent); color: var(--ink); }
  .btn-ghost:disabled { opacity: .55; cursor: not-allowed; background: var(--surface-2); border-color: var(--line); color: var(--muted); }
  .btn-ghost.danger { color: var(--danger); border-color: var(--danger); }
  .btn-ghost.danger:hover { background: var(--danger-soft); }
  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .btn-row.spread { justify-content: flex-start; }
  .btn-link {
    background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer;
    font-size: 14px; text-decoration: underline; text-underline-offset: 3px; padding: 6px 4px;
    min-height: 44px;
  }
  a.btn, a.btn-ghost { text-decoration: none; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  /* intro list */
  .intro-list { list-style: none; margin: 0 0 22px; padding: 0; display: grid; gap: 13px; }
  .intro-list li { display: flex; gap: 12px; align-items: flex-start; color: var(--ink-soft); }
  .intro-list .ic { font-size: 19px; line-height: 1.4; flex-shrink: 0; }

  /* hero главной: текст + фото продукта */
  .hero { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
  .hero-copy { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .hero-photo { margin: 0; }
  .hero-photo-link { display: block; border-radius: 14px; }
  .hero-photo img { display: block; width: 100%; height: auto; aspect-ratio: 4 / 5; object-fit: contain; border-radius: 14px; border: 1px solid var(--line); background: #06263a; }
  .hero-photo.ph { position: relative; aspect-ratio: 4 / 5; border-radius: 14px; border: 1px dashed var(--line-strong); background: var(--surface-2); display: grid; place-items: center; text-align: center; color: var(--muted); font-size: 14px; padding: 20px; }
  .hero-photo.ph .hero-photo-link { display: none; }
  .hero-photo.ph::before { content: "🛥️ Здесь будет фото готового EVA-коврика в лодке"; max-width: 22ch; line-height: 1.5; }
  .hero-slot { margin: 0; }
  .hero-slot--inline { width: min(100%, 300px); justify-self: center; }
  .hero-slot--side { display: none; }
  @media (min-width: 860px) {
    .hero { grid-template-columns: 1fr minmax(300px, 400px); column-gap: 34px; align-items: start; }
    .hero-slot--side { display: block; position: sticky; top: 16px; }
    .hero-slot--inline { display: none; }
  }

  /* station list */
  .stations { list-style: none; margin: 0 0 18px; padding: 0; display: grid; gap: 8px; }
  .station {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border: 1.5px solid var(--line); border-radius: var(--radius-sm); padding: 10px 14px;
    background: var(--surface); transition: border-color .15s;
  }
  .station:hover { border-color: var(--accent); }
  .station .st-off { font-size: 13.5px; color: var(--muted); }
  .station .st-w {
    font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 700; font-size: 16px;
    color: var(--ink); background: none; border: none; cursor: pointer; padding: 8px 10px;
    border-radius: 7px; text-decoration: underline dotted; text-underline-offset: 4px; min-height: 44px;
  }
  .station .st-w:hover { background: var(--surface-2); }
  .station .st-edit { display: flex; gap: 8px; align-items: center; }
  .station .st-edit input { width: 92px; text-align: right; padding: 8px 10px; }

  .current-box {
    border: 2px solid var(--accent-soft); background: var(--surface-2);
    border-radius: var(--radius); padding: 16px 16px 18px; margin-bottom: 8px;
  }
  :root[data-theme="dark"] .current-box, .current-box { border-color: var(--line); }
  .current-box .field { margin-bottom: 14px; }

  .callout {
    border-radius: var(--radius); padding: 14px 16px; margin: 6px 0 16px; font-size: 14.5px;
  }
  .callout.warn { background: var(--active-soft); color: #7a4a0f; }
  :root[data-theme="dark"] .callout.warn { color: var(--active); }
  .callout.info { background: var(--accent-soft); color: var(--accent-ink); }
  .callout.good { background: var(--good-soft); color: var(--good); }
  .callout.confirm { background: var(--active-soft); border: 2px solid var(--active); color: var(--ink); }
  .callout.danger { background: var(--danger-soft); border: 2px solid var(--danger); color: var(--ink); }
  .callout.err-list { background: var(--danger-soft); }
  .callout.err-list p { margin: 3px 0; color: var(--danger); font-size: 13.5px; }

  .actions-footer { display: flex; flex-wrap: wrap; gap: 10px; border-top: 1px solid var(--line); padding-top: 18px; margin-top: 8px; }

  /* tables */
  .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 20px; }
  table { width: 100%; min-width: 420px; border-collapse: collapse; font-size: 14px; }
  caption { text-align: left; padding: 12px 16px 6px; font-weight: 600; color: var(--ink-soft); font-size: 14px; }
  thead th { text-align: left; font-weight: 600; color: var(--muted); background: var(--surface-2); padding: 10px 16px; }
  tbody td { padding: 10px 16px; border-top: 1px solid var(--line); }
  tbody tr:first-child td { border-top: none; }
  td.prod, .prod { color: var(--accent-ink); font-weight: 700; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  td.raw { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* summary */
  .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
  @media (min-width: 640px) { .summary { grid-template-columns: repeat(4, 1fr); } }
  .sum-cell { background: var(--surface-2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .sum-cell .k { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .sum-cell .v { font-size: 17px; font-weight: 700; margin-top: 3px; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .sum-cell.accent .v { color: var(--accent-ink); }

  .consent {
    display: flex; gap: 12px; align-items: flex-start; cursor: pointer;
    border: 2px solid var(--line); border-radius: var(--radius); padding: 15px 16px; background: var(--surface);
    margin: 8px 0 4px;
  }
  .consent input { width: 20px; height: 20px; margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; }

  /* price */
  .price-card { border: 1px solid var(--line); background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 22px; box-shadow: var(--shadow); }
  .price-card .plabel { font-size: 13px; color: var(--muted); }
  .price-card .pval { font-size: 30px; font-weight: 800; font-family: var(--mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .price-card .pnote { margin-top: 10px; background: var(--accent-soft); color: var(--accent-ink); font-size: 13.5px; padding: 8px 12px; border-radius: 8px; }
  .price-card .pnote2 { margin-top: 10px; color: var(--muted); font-size: 14px; }

  /* компактная сводка цены на экране проверки */
  .price-summary { border: 1px solid var(--line); background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin: 4px 0 18px; box-shadow: var(--shadow); }
  .price-summary .ps-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; padding: 3px 0; color: var(--ink-soft); }
  .price-summary .ps-price { font-size: 20px; font-weight: 800; color: var(--ink); }
  .price-summary .ps-price .num { color: var(--accent-ink); }
  .price-summary .ps-note { margin-top: 6px; font-size: 13px; color: var(--muted); }

  /* бейдж исполнения (цельный / N частей) */
  /* спокойная информационная подпись о двух частях — прямо под чертежом */
  .parts-note { margin: 12px 2px 0; font-size: 13.5px; line-height: 1.5; color: var(--muted); border-top: 1px dashed var(--line); padding-top: 10px; }

  .privacy-note { font-size: 12.5px; color: var(--muted); margin: -6px 0 6px; }
  .tg-btn { background: #229ED9; }
  .tg-btn:hover { filter: brightness(1.06); }
  .contact-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2px; }
  .email-btn { text-decoration: none; }

  .export-actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 6px 0 18px; }
  .draw-save { margin: 4px 0 18px; }
  .draw-save img { display: block; width: 100%; max-width: 340px; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
  .draw-save .hint { font-size: 13.5px; color: var(--muted); margin: 10px 0 0; max-width: 56ch; }
  details.order-text { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 6px 16px; }
  details.order-text summary { cursor: pointer; font-weight: 600; color: var(--ink-soft); padding: 10px 0; }
  details.order-text pre { white-space: pre-wrap; font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); overflow-x: auto; }

  /* blueprint preview */
  .blueprint { position: sticky; top: 18px; border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 16px; }
  .blueprint-title { text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .blueprint-frame {
    background-color: var(--surface-2);
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 22px 22px;
    border: 1px solid var(--line); border-radius: 10px; padding: 8px;
  }
  .blueprint-frame svg { display: block; width: 100%; height: auto; max-height: 68vh; }
  .empty-frame { min-height: 300px; display: grid; place-items: center; text-align: center; color: var(--muted); font-size: 14px; padding: 20px; }

  .review-blueprint { border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface); padding: 16px; margin-bottom: 4px; }
  .review-blueprint .blueprint-frame { max-width: 460px; margin: 0 auto; }
  .review-blueprint .blueprint-frame svg { max-height: 420px; }

  /* mobile preview */
  .mobile-preview { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; display: none; }
  .mobile-preview.on { display: block; }
  .mobile-preview-body {
    background: var(--surface); border-top: 1px solid var(--line);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.18); padding: 12px;
  }
  .mobile-preview-body .blueprint-frame svg { max-height: 44vh; }
  .mobile-toggle {
    width: 100%; min-height: 48px; border: none; border-top: 1px solid var(--accent-ink);
    background: var(--accent); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .mobile-spacer { height: 56px; }
  @media (min-width: 940px) { .mobile-spacer { display: none; } }

  .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  .step-title:focus { outline: none; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  /* печать: оставляем только чертёж, номер и текст заявки, прячем интерфейс */
  @media print {
    #app { background: #fff; }
    .topbar, .progress, .export-actions, .actions-footer, .mobile-preview, .mobile-spacer,
    .btn, .btn-ghost, .btn-link, .draw-save .hint { display: none !important; }
    .blueprint, .review-blueprint, .price-card, .callout, details.order-text { box-shadow: none; border: 1px solid #ccc; }
    .blueprint { position: static; }
    details.order-text[open] pre { white-space: pre-wrap; }
    .draw-save img { max-width: 60%; }
  }
</style>

<div id="app">
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="mark">⚓</span> KOVRIKVLODKY.RU</div>
      <div class="topbar-actions" id="topActions"></div>
    </div>
    <div class="progress" id="progress" hidden></div>
    <div class="layout" id="layout">
      <main class="form-col" id="stepPanel"></main>
      <aside class="preview-col" id="previewAside" hidden>
        <div class="blueprint">
          <div class="blueprint-title" id="previewTitle">Чертёж по вашим замерам</div>
          <div class="blueprint-frame" id="previewDesktop"></div>
        </div>
      </aside>
    </div>
  </div>
  <div class="mobile-spacer" id="mobileSpacer" hidden></div>
  <div class="mobile-preview" id="mobilePreview">
    <div class="mobile-preview-body" id="mobileBody" hidden><div class="blueprint-frame" id="previewMobile"></div></div>
    <button class="mobile-toggle" id="mobileToggle" aria-expanded="false">▲ Показать чертёж</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------- domain: parse / format ----------
  function parseCm(raw) {
    if (raw == null) return null;
    var t = String(raw).trim().replace(",", ".");
    if (t === "") return null;
    if (!/^\d+(\.\d+)?$/.test(t)) return null;
    var v = Number(t);
    return Number.isFinite(v) ? v : null;
  }
  function fmt(v) {
    if (v == null) return "—";
    return Number.isInteger(v) ? String(v) : v.toFixed(1).replace(".", ",");
  }

  // ---------- domain: adjustments ----------
  var FLOOR = {
    rigid: { widthDeltaCm: 0, lengthDeltaCm: 0 },
    ndnd: { widthDeltaCm: 10, lengthDeltaCm: -3 }
  };
  function applyFloor(input, floor) {
    var a = FLOOR[floor];
    return {
      lengthCm: input.lengthCm + a.lengthDeltaCm,
      constantWidthCm: input.constantWidthCm + a.widthDeltaCm,
      bowStations: input.bowStations.map(function (s) {
        return { id: s.id, offsetFromBowCm: s.offsetFromBowCm, inputWidthCm: s.inputWidthCm,
                 productionWidthCm: s.inputWidthCm + a.widthDeltaCm };
      }),
      adjustments: { widthDeltaCm: a.widthDeltaCm, lengthDeltaCm: a.lengthDeltaCm }
    };
  }

  // ---------- domain: geometry ----------
  function buildProfile(lengthCm, constW, stations) {
    var sorted = stations.filter(function (s) { return s.offsetFromBowCm >= 0 && s.offsetFromBowCm <= lengthCm; })
      .slice().sort(function (a, b) { return a.offsetFromBowCm - b.offsetFromBowCm; });
    var profile = [];
    sorted.forEach(function (s) {
      var prev = profile[profile.length - 1];
      if (prev && prev.y === s.offsetFromBowCm) prev.w = s.widthCm;
      else profile.push({ y: s.offsetFromBowCm, w: s.widthCm });
    });
    if (profile.length === 0 || profile[profile.length - 1].y < lengthCm) {
      profile.push({ y: lengthCm, w: constW });
    }
    return profile;
  }
  function buildPolygon(profile) {
    var left = profile.map(function (p) { return { x: -p.w / 2, y: p.y }; });
    var right = profile.slice().reverse().map(function (p) { return { x: p.w / 2, y: p.y }; });
    return left.concat(right);
  }
  function shoelace(pts) {
    var s = 0;
    for (var i = 0; i < pts.length; i++) {
      var a = pts[i], b = pts[(i + 1) % pts.length];
      s += a.x * b.y - b.x * a.y;
    }
    return Math.abs(s) / 2;
  }
  function perim(pts) {
    var s = 0;
    for (var i = 0; i < pts.length; i++) {
      var a = pts[i], b = pts[(i + 1) % pts.length];
      s += Math.hypot(b.x - a.x, b.y - a.y);
    }
    return s;
  }
  function maxW(profile) { return profile.reduce(function (m, p) { return Math.max(m, p.w); }, 0); }
  function computeGeometry(lengthCm, constW, stations) {
    var profile = buildProfile(lengthCm, constW, stations);
    var poly = buildPolygon(profile);
    return { polygonPointsCm: poly, areaM2: shoelace(poly) / 10000, perimeterM: perim(poly) / 100, profile: profile };
  }

  // ---------- domain: validation ----------
  var LIMITS = { maxLengthCm: 800, minLengthCm: 50, maxWidthCm: 300, minWidthCm: 10 };
  function validateLength(v, floor) {
    if (v == null || !Number.isFinite(v)) return { level: "error", message: "Введите длину в сантиметрах, например 220" };
    if (v <= 0) return { level: "error", message: "Длина должна быть больше нуля" };
    if (v < LIMITS.minLengthCm) return { level: "error", message: "Слишком маленькая длина. Минимум " + LIMITS.minLengthCm + " см" };
    if (v > LIMITS.maxLengthCm) return { level: "error", message: "Слишком большая длина. Максимум " + LIMITS.maxLengthCm + " см" };
    if (floor === "ndnd" && v + FLOOR.ndnd.lengthDeltaCm <= 0) return { level: "error", message: "Для НДНД итоговая длина после вычета 3 см должна быть положительной" };
    return null;
  }
  function validateWidth(v) {
    if (v == null || !Number.isFinite(v)) return { level: "error", message: "Введите ширину в сантиметрах, например 80" };
    if (v <= 0) return { level: "error", message: "Ширина должна быть больше нуля" };
    if (v < LIMITS.minWidthCm) return { level: "error", message: "Слишком маленькая ширина. Минимум " + LIMITS.minWidthCm + " см" };
    if (v > LIMITS.maxWidthCm) return { level: "error", message: "Слишком большая ширина. Максимум " + LIMITS.maxWidthCm + " см" };
    return null;
  }
  function bowWarnings(v, prev, constW) {
    var w = [];
    if (prev != null && v < prev) w.push("Ширина уменьшилась (была " + fmt(prev) + " см). В носовой части ширина обычно растёт сверху вниз. Проверьте замер.");
    if (constW != null && v > constW) w.push("Значение больше указанной ширины центральной части (" + fmt(constW) + " см). Проверьте замер.");
    return w;
  }
  function orderReadiness(d) {
    var problems = [];
    if (d.lengthCm == null) problems.push("Не указана общая длина");
    if (d.constantWidthCm == null) problems.push("Не указана постоянная ширина");
    if (d.bowWidths.length < 1) problems.push("Нет верхней ширины носа");
    if (d.bowWidths.length < 2) problems.push("Нужен хотя бы ещё один носовой замер");
    if (!d.constantWidthFixed) problems.push("Не зафиксирована постоянная ширина");
    if (!d.floorType) problems.push("Не выбран тип дна");
    if (!d.dimensionsConfirmed) problems.push("Нет подтверждения итоговых размеров");
    var bad = d.bowWidths.some(function (w) { return !Number.isFinite(w) || w <= 0; });
    if (bad) problems.push("Есть некорректные значения замеров");
    return { ready: problems.length === 0, problems: problems };
  }

  // ---------- domain: pricing / manufacturing (из внешних тестируемых модулей) ----------
  var PRICING = window.PricingCore.PRICING;
  var MANUFACTURING = window.ManufacturingCore.MANUFACTURING_CONFIG;
  var computePricing = window.PricingCore.computePricing; // (cfg, geo) -> pricing result
  var computeParts = window.ManufacturingCore.computeParts; // (productionLengthCm) -> parts

  // ---------- draft state ----------
  var APP_VERSION = "2026-07-mvp";
  var STORAGE = "boat-mat-draft-v1";
  var BOW_STEP = 10;
  function rub(n) { return n.toLocaleString("ru-RU") + " ₽"; }
  function emptyDraft() {
    var now = new Date().toISOString();
    return {
      schemaVersion: 1,
      id: "draft-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8),
      createdAt: now, updatedAt: now, step: 0,
      boatName: "", floorType: null, lengthCm: null, constantWidthCm: null,
      bowWidths: [], constantWidthFixed: false,
      customer: { name: "", phone: "", comment: "" }, dimensionsConfirmed: false
    };
  }
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE);
      if (!raw) return emptyDraft();
      var p = JSON.parse(raw);
      if (p && p.schemaVersion === 1) { if (!p.customer) p.customer = { name: "", phone: "", comment: "" }; return p; }
    } catch (e) {}
    return emptyDraft();
  }
  function save() {
    draft.updatedAt = new Date().toISOString();
    try { localStorage.setItem(STORAGE, JSON.stringify(draft)); } catch (e) {}
  }

  var draft = load();
  var ui = { highlight: null, editingIndex: null, currentRaw: "", currentErr: null, confirmWidth: null, confirmRestart: false, confirmReset: false, submitAttempted: false, contactErr: {}, orderNumber: null, pendingOrderNumber: null, submitMode: null, submitChannels: null };

  // ---------- SVG blueprint ----------
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

  // фиксированная «чертёжная» палитра для экспорта в файл/картинку (тёмные чернила на белом, не зависит от темы)
  var PRINT_COLORS = { accent: "#123444", accentInk: "#0e2836", fill: "#eef4f7", active: "#b5651d", muted: "#566973", line: "#8399a6", seam: "#b42318" };

  // ширина коврика на высоте y (линейная интерполяция по профилю)
  function widthAtY(profile, y) {
    for (var i = 0; i < profile.length - 1; i++) {
      var a = profile[i], b = profile[i + 1];
      if (y >= a.y && y <= b.y) { var t = (b.y - a.y) ? (y - a.y) / (b.y - a.y) : 0; return a.w + (b.w - a.w) * t; }
    }
    return profile[profile.length - 1].w;
  }
  // Позиция шва для двухчастного коврика: на уровне последнего замера носа (не по центру!).
  // Если так привязать нельзя (обе части ≤ лимита не получаются) — шов не показываем.
  function seamYs(parts, lengthCm, stations) {
    if (!parts || !parts.valid || parts.partCount !== 2) return [];
    var maxOff = 0;
    (stations || []).forEach(function (s) { if (s.offsetFromBowCm > maxOff) maxOff = s.offsetFromBowCm; });
    var y = maxOff; // уровень последней введённой ширины носа
    var max = parts.maxSinglePartLengthCm || 210;
    if (y > 0 && y < lengthCm && y <= max && (lengthCm - y) <= max) return [y];
    return [];
  }

  function renderSvg(lengthCm, constW, stations, highlight, provisional, colors, splitYs) {
    if (lengthCm == null || constW == null || lengthCm <= 0 || constW <= 0) {
      return '<div class="empty-frame">Чертёж появится после ввода длины и ширины</div>';
    }
    var eff = stations, prov = false;
    if (!stations || stations.length === 0) {
      prov = true;
      eff = [{ offsetFromBowCm: 0, widthCm: constW * 0.45 }, { offsetFromBowCm: lengthCm * 0.25, widthCm: constW }];
    }
    if (provisional === false) prov = false;
    var profile = buildProfile(lengthCm, constW, eff);
    var poly = buildPolygon(profile);
    var mw = maxW(profile);
    var padX = 96, padTop = 26, padBottom = 46;
    var vbW = mw + padX * 2, vbH = lengthCm + padTop + padBottom, cx = vbW / 2;
    function tX(x) { return (cx + x).toFixed(1); }
    function tY(y) { return (padTop + y).toFixed(1); }
    var fs = Math.max(9, vbH * 0.028);
    var sw = vbH * 0.0045;
    var css = getComputedStyle(document.documentElement);
    var C = colors || {
      accent: css.getPropertyValue("--accent").trim() || "#0b6e8f",
      accentInk: css.getPropertyValue("--accent-ink").trim() || "#075169",
      fill: css.getPropertyValue("--accent-soft").trim() || "#e1f0f5",
      active: css.getPropertyValue("--active").trim() || "#d9821a",
      muted: css.getPropertyValue("--muted").trim() || "#6b7f90",
      line: css.getPropertyValue("--line-strong").trim() || "#b9c8d3",
      seam: css.getPropertyValue("--danger").trim() || "#c0392b"
    };
    var cAccent = C.accent, cAccentInk = C.accentInk, cFill = C.fill, cActive = C.active, cMuted = C.muted, cLine = C.line;
    var cSeam = C.seam || "#c0392b";

    var d = poly.map(function (p, i) { return (i === 0 ? "M" : "L") + " " + tX(p.x) + " " + tY(p.y); }).join(" ") + " Z";
    var out = '<svg viewBox="0 0 ' + vbW.toFixed(0) + ' ' + vbH.toFixed(0) + '" role="img" aria-label="Чертёж коврика">';
    out += '<path d="' + d + '" fill="' + cFill + '" fill-opacity="0.6" stroke="' + cAccent + '" stroke-width="' + sw.toFixed(2) + '"' + (prov ? ' stroke-dasharray="9 6"' : "") + ' stroke-linejoin="round"/>';
    // center axis
    out += '<line x1="' + cx + '" y1="' + tY(0) + '" x2="' + cx + '" y2="' + tY(lengthCm) + '" stroke="' + cAccent + '" stroke-width="' + (sw * 0.35).toFixed(2) + '" stroke-dasharray="7 7" opacity="0.5"/>';
    // stations
    if (!prov) {
      profile.forEach(function (p) {
        var active = highlight && highlight.type === "station" && highlight.offsetCm === p.y;
        var col = active ? cActive : cLine;
        out += '<line x1="' + tX(-p.w / 2) + '" y1="' + tY(p.y) + '" x2="' + tX(p.w / 2) + '" y2="' + tY(p.y) + '" stroke="' + col + '" stroke-width="' + (active ? sw * 1.1 : sw * 0.45).toFixed(2) + '"' + (active ? "" : ' stroke-dasharray="5 4"') + '/>';
        out += '<text x="' + (Number(tX(p.w / 2)) + 7) + '" y="' + (Number(tY(p.y)) + fs * 0.34).toFixed(1) + '" font-size="' + fs.toFixed(1) + '" font-family="ui-monospace,Menlo,monospace" fill="' + (active ? cActive : cAccentInk) + '" font-weight="' + (active ? 700 : 500) + '">' + fmt(p.w) + '</text>';
        out += '<text x="' + (Number(tX(-p.w / 2)) - 7) + '" y="' + (Number(tY(p.y)) + fs * 0.34).toFixed(1) + '" font-size="' + (fs * 0.82).toFixed(1) + '" font-family="ui-monospace,Menlo,monospace" fill="' + (active ? cActive : cMuted) + '" text-anchor="end">' + fmt(p.y) + '</text>';
      });
    }
    // length dimension
    var lenActive = highlight && highlight.type === "length";
    var lenX = 24, lc = lenActive ? cActive : cAccentInk;
    out += '<line x1="' + lenX + '" y1="' + tY(0) + '" x2="' + lenX + '" y2="' + tY(lengthCm) + '" stroke="' + lc + '" stroke-width="' + (lenActive ? sw : sw * 0.5).toFixed(2) + '"/>';
    out += '<line x1="' + (lenX - 6) + '" y1="' + tY(0) + '" x2="' + (lenX + 6) + '" y2="' + tY(0) + '" stroke="' + lc + '" stroke-width="' + (sw * 0.5).toFixed(2) + '"/>';
    out += '<line x1="' + (lenX - 6) + '" y1="' + tY(lengthCm) + '" x2="' + (lenX + 6) + '" y2="' + tY(lengthCm) + '" stroke="' + lc + '" stroke-width="' + (sw * 0.5).toFixed(2) + '"/>';
    var lmY = Number(tY(lengthCm / 2));
    out += '<text x="' + (lenX - 9) + '" y="' + lmY.toFixed(1) + '" font-size="' + fs.toFixed(1) + '" font-family="ui-monospace,Menlo,monospace" fill="' + lc + '" font-weight="' + (lenActive ? 700 : 500) + '" text-anchor="middle" transform="rotate(-90 ' + (lenX - 9) + ' ' + lmY.toFixed(1) + ')">' + fmt(lengthCm) + ' см</text>';
    // width dimension bottom
    var wActive = highlight && highlight.type === "constantWidth";
    var wc = wActive ? cActive : cAccentInk, wy = Number(tY(lengthCm)) + 14;
    out += '<line x1="' + tX(-constW / 2) + '" y1="' + wy + '" x2="' + tX(constW / 2) + '" y2="' + wy + '" stroke="' + wc + '" stroke-width="' + (wActive ? sw : sw * 0.5).toFixed(2) + '"/>';
    out += '<text x="' + cx + '" y="' + (wy + fs * 1.2).toFixed(1) + '" font-size="' + fs.toFixed(1) + '" font-family="ui-monospace,Menlo,monospace" fill="' + wc + '" font-weight="' + (wActive ? 700 : 500) + '" text-anchor="middle">' + fmt(constW) + ' см</text>';
    // линии шва для многочастного коврика (ориентировочные — точное место подтверждает менеджер)
    if (!prov && splitYs && splitYs.length) {
      splitYs.forEach(function (sy) {
        var hw = widthAtY(profile, sy) / 2;
        out += '<line x1="' + tX(-hw) + '" y1="' + tY(sy) + '" x2="' + tX(hw) + '" y2="' + tY(sy) + '" stroke="' + cSeam + '" stroke-width="' + (sw * 1.1).toFixed(2) + '" stroke-dasharray="' + (fs * 0.5).toFixed(1) + ' ' + (fs * 0.35).toFixed(1) + '"/>';
        out += '<text x="' + cx + '" y="' + (Number(tY(sy)) - fs * 0.5).toFixed(1) + '" font-size="' + (fs * 0.8).toFixed(1) + '" font-family="ui-monospace,Menlo,monospace" fill="' + cSeam + '" font-weight="700" text-anchor="middle">шов ✂</text>';
      });
    }
    out += "</svg>";
    return out;
  }

  // ---------- order text + export ----------
  function currentInputDims() {
    if (draft.lengthCm == null || draft.constantWidthCm == null) return null;
    return {
      lengthCm: draft.lengthCm, constantWidthCm: draft.constantWidthCm,
      bowStations: draft.bowWidths.map(function (w, i) { return { id: "bow-" + i, offsetFromBowCm: i * BOW_STEP, inputWidthCm: w }; })
    };
  }
  function buildOrder() {
    var input = currentInputDims();
    if (!input || !draft.floorType) return null;
    var prod = applyFloor(input, draft.floorType);
    var stations = prod.bowStations.map(function (s) { return { offsetFromBowCm: s.offsetFromBowCm, widthCm: s.productionWidthCm }; });
    var geo = computeGeometry(prod.lengthCm, prod.constantWidthCm, stations);
    // цена по площади реального производственного полигона (geo.areaM2 — источник истины)
    var pricing = computePricing(PRICING, geo);
    var parts = computeParts(prod.lengthCm, MANUFACTURING);
    return { id: draft.id, input: input, prod: prod, geo: geo, pricing: pricing, parts: parts };
  }
  function orderText(o, explicitOrderNumber) {
    var FL = { rigid: "Жёсткое дно", ndnd: "НДНД (надувное дно низкого давления)" };
    var L = [];
    L.push("ЗАЯВКА НА EVA-КОВРИК ДЛЯ ЛОДКИ");
    L.push("Номер: " + (explicitOrderNumber || ui.orderNumber || o.id));
    L.push("");
    if (draft.boatName) L.push("Лодка: " + draft.boatName);
    L.push("Тип дна: " + FL[draft.floorType]);
    L.push("");
    L.push("РАЗМЕРЫ ЛОДКИ — ЗАМЕРЫ КЛИЕНТА");
    L.push("Внутренняя длина лодки: " + fmt(o.input.lengthCm) + " см");
    L.push("Постоянная внутренняя ширина: " + fmt(o.input.constantWidthCm) + " см");
    o.input.bowStations.forEach(function (s) { L.push("Нос, " + fmt(s.offsetFromBowCm) + " см от верхней точки: " + fmt(s.inputWidthCm) + " см"); });
    L.push("");
    L.push("ПРОИЗВОДСТВЕННЫЕ РАЗМЕРЫ КОВРИКА");
    L.push("Длина коврика: " + fmt(o.prod.lengthCm) + " см");
    L.push("Постоянная ширина коврика: " + fmt(o.prod.constantWidthCm) + " см");
    o.prod.bowStations.forEach(function (s) { L.push("Нос, " + fmt(s.offsetFromBowCm) + " см от верхней точки: " + fmt(s.productionWidthCm) + " см"); });
    var a = o.prod.adjustments;
    L.push("Поправки на тип дна: ширина " + (a.widthDeltaCm >= 0 ? "+" : "") + a.widthDeltaCm + " см, длина " + (a.lengthDeltaCm >= 0 ? "+" : "") + a.lengthDeltaCm + " см");
    L.push("");
    L.push("ИСПОЛНЕНИЕ");
    if (o.parts.partCount <= 1) {
      L.push("Количество частей: 1 (цельный коврик)");
    } else {
      L.push("Количество частей: " + o.parts.partCount);
      L.push("Максимальная длина одной части: " + o.parts.maxSinglePartLengthCm + " см");
      L.push("Место соединения: требуется подтверждение менеджера");
    }
    if (!o.parts.supported) L.push("Внимание: для этой длины требуется индивидуальное согласование конструкции.");
    L.push("");
    L.push("РАСЧЁТ");
    L.push("Площадь коврика: " + o.geo.areaM2.toFixed(2).replace(".", ",") + " м²");
    if (o.pricing.valid) {
      L.push("Стоимость: " + o.pricing.finalPriceRub.toLocaleString("ru-RU") + " ₽");
      L.push("Доставка: по тарифам транспортной компании");
      L.push("Ориентир по доставке: " + o.pricing.deliveryMinRub + "–" + o.pricing.deliveryMaxRub + " ₽");
      L.push("Версия расчёта: " + o.pricing.pricingVersion);
    } else {
      L.push("Стоимость: уточняется менеджером");
    }
    L.push("");
    L.push("КОНТАКТЫ");
    L.push("Имя: " + draft.customer.name);
    L.push("Телефон: " + draft.customer.phone);
    if (draft.customer.comment) L.push("Комментарий: " + draft.customer.comment);
    L.push("");
    L.push("Размеры подтверждены клиентом: " + (draft.dimensionsConfirmed ? "да" : "нет"));
    return L.join("\n");
  }
  function exportSvgFile(o) {
    var stations = o.prod.bowStations.map(function (s) { return { offsetFromBowCm: s.offsetFromBowCm, widthCm: s.productionWidthCm }; });
    // фиксированная печатная палитра — чертёж всегда тёмный на белом, независимо от темы экрана
    var inner = renderSvg(o.prod.lengthCm, o.prod.constantWidthCm, stations, null, false, PRINT_COLORS, seamYs(o.parts, o.prod.lengthCm, stations));
    return '<?xml version="1.0" encoding="UTF-8"?>\n' + inner.replace("<svg ", '<svg xmlns="http://www.w3.org/2000/svg" style="background:#fff" ');
  }
  function orderJson(o) {
    return JSON.stringify(orderPayload(o), null, 2);
  }

  function download(name, mime, content) {
    try {
      var blob = new Blob([content], { type: mime + ";charset=utf-8" });

      var a = document.createElement("a");
      a.href = url; a.download = name; a.rel = "noopener"; a.style.display = "none";

  function renderPngInto(imgEl, svgString) {
    var svgUrl = dataUri("image/svg+xml", withPxSize(svgString));

  // Спокойная подпись под чертежом. Для длинных ковриков — про две части (без крупного предупреждения).

        : '';
      var sentBanner = ui.submitMode === "sent"

        : '<div class="callout good"><p style="margin:0 0 4px;font-size:16px">Заявка готова ✅ Номер: <strong class="num">' + esc(ui.orderNumber) + '</strong></p><p style="margin:0">Отправьте её менеджеру удобным способом — текст и чертёж ниже.' + priceLine + '</p></div>';
      return '<h2 class="step-title">' + (ui.submitMode === "sent" ? "Заявка отправлена ✅" : "Заявка готова ✅") + '</h2><div style="height:14px"></div>' +
        sentBanner +
        telegramButtonHtml(txt) +
        '<div class="export-actions"><button class="btn-ghost" data-act="copyText">📋 Скопировать текст заявки</button>' +
        '<button class="btn-ghost" data-act="dlSvg">⬇ Скачать чертёж SVG</button>' +
        '<button class="btn-ghost" data-act="dlJson">⬇ Скачать данные JSON</button></div>' +
        '<div class="draw-save"><img id="orderImg" alt="Чертёж коврика ' + esc(ui.orderNumber) + '"><p class="hint">Чертёж можно сохранить картинкой: на телефоне — <strong>долгое нажатие</strong> → «Сохранить», на компьютере — <strong>правой кнопкой</strong> → «Сохранить изображение». Или отправьте скриншотом.</p></div>' +

        '<div class="actions-footer"><button class="btn-ghost" data-act="newOrder">Новый расчёт</button></div>';

      : '<p style="margin:0;color:var(--ink-soft)">Стоимость временно недоступна. Отправьте заявку для уточнения.</p>';

    var contactDisabled = deliveryLocked ? " disabled" : "";
    var statusHtml = "";

    else if (ui.submitMode === "error") {

      statusHtml = partiallyDelivered
        ? '<div class="callout warn" role="alert">Один канал уже получил заявку, второй пока не подтвердил доставку. Нажмите «Повторить отправку» — уже доставленный канал не будет дублироваться. Чтобы изменить данные, начните новый расчёт.</div>'
        : '<div class="callout danger" role="alert">' + esc(ui.contactErr.form || "Сервис не подтвердил отправку. Проверьте данные и интернет, затем попробуйте ещё раз.") + '</div>' + telegramButtonHtml(orderText(o, ui.pendingOrderNumber));
    }

    var html = '<div class="eyebrow">Шаг 5 из 5</div><h2 class="step-title">Стоимость и заказ</h2><div style="height:16px"></div>' +
      '<div class="price-card">' + priceHtml + "</div>" +
      '<h3 style="font-size:18px;margin:6px 0 14px">Ваши контакты</h3>' +
      field("Имя", "", null, ui.contactErr.name ? { message: ui.contactErr.name } : null,
        '<input id="c-name" type="text" maxlength="120" value="' + esc(draft.customer.name) + '" class="' + (ui.contactErr.name ? "err" : "") + '" autocomplete="name"' + contactDisabled + '>') +
      field("Телефон", "", null, ui.contactErr.phone ? { message: ui.contactErr.phone } : null,
        '<input id="c-phone" type="tel" inputmode="tel" maxlength="40" value="' + esc(draft.customer.phone) + '" placeholder="+7 900 000-00-00" class="' + (ui.contactErr.phone ? "err" : "") + '" autocomplete="tel"' + contactDisabled + '>') +
      field("Комментарий", '<span class="opt">(необязательно)</span>', null, ui.contactErr.comment ? { message: ui.contactErr.comment } : null,
        '<textarea id="c-comment" rows="3" maxlength="2000" class="' + (ui.contactErr.comment ? "err" : "") + '"' + contactDisabled + '>' + esc(draft.customer.comment || "") + "</textarea>") +
      '<p class="privacy-note">Нажимая кнопку, вы соглашаетесь на обработку указанных контактных данных для связи по заявке.</p>';
    if (ui.contactErr.form && ui.submitMode !== "error") {
      html += '<div class="callout danger" role="alert">' + esc(ui.contactErr.form) + '</div>';
    }
    if (!readiness.ready) {
      html += '<div class="callout err-list">' + readiness.problems.map(function (pr) { return "<p>• " + pr + "</p>"; }).join("") + "</div>";
    }
    html += statusHtml;
    var busy = ui.submitMode === "sending";
    html += '<div class="actions-footer"><button class="btn-ghost" data-act="back4" ' + (deliveryLocked ? "disabled" : "") + '>Назад</button>' +
      '<button class="btn" data-act="submit" ' + (readiness.ready && !busy ? "" : "disabled") + '>' + (busy ? "Отправляем…" : ctaLabel) + '</button></div>';
    return html;
  }

  function orderEndpoint() {
    var c = window.BOAT_MAT_PUBLIC_CONFIG || {};
    return (c.orderEndpoint || "").trim();
  }
  // Короткое тело письма для mailto (длинный mailto Chrome/почта не открывают).
  function emailBodyShort(o, num) {
    var FL = { rigid: "Жёсткое дно", ndnd: "НДНД" };
    var L = [];
    L.push("Заявка " + (num || o.id));
    if (draft.boatName) L.push("Лодка: " + draft.boatName);
    L.push("Тип дна: " + (FL[draft.floorType] || draft.floorType));
    L.push("Коврик: " + fmt(o.prod.lengthCm) + "×" + fmt(o.prod.constantWidthCm) + " см, площадь " + o.geo.areaM2.toFixed(2).replace(".", ",") + " м²");
    if (o.parts && o.parts.partCount > 1) L.push("Частей: " + o.parts.partCount);
    if (o.pricing.valid) L.push("Стоимость: " + o.pricing.finalPriceRub + " руб (доставка отдельно)");
    L.push("Имя: " + draft.customer.name);
    L.push("Телефон: " + draft.customer.phone);
    if (draft.customer.comment) L.push("Комментарий: " + draft.customer.comment.slice(0, 200));
    L.push("");
    L.push("Прикрепите к письму скачанный чертёж (кнопка «Скачать чертёж SVG» на сайте).");
    return L.join("\n");
  }
  function telegramButtonHtml(txt) {
    var c = window.BOAT_MAT_PUBLIC_CONFIG || {};
    var btns = [];
    if (c.telegramContact) {
      btns.push('<a class="btn tg-btn" data-act="tg" href="https://t.me/' + encodeURIComponent(c.telegramContact) + '" target="_blank" rel="noopener">Написать в Telegram @' + esc(c.telegramContact) + '</a>');
    }
    if (c.orderEmail) {
      var o = buildOrder();
      var subject = "Заявка на EVA-коврик" + (ui.orderNumber ? " " + ui.orderNumber : "");
      var body = o ? emailBodyShort(o, ui.orderNumber) : (txt || "");
      btns.push('<a class="btn-ghost email-btn" data-act="email" href="mailto:' + esc(c.orderEmail) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body) + '">✉ Отправить на email</a>');
    }
    if (!btns.length) return "";
    return '<div class="contact-btns">' + btns.join("") + '</div>' +
      '<p class="hint" style="margin:8px 0 16px">' +
      (c.telegramContact ? 'Telegram: откроется чат с менеджером, полный текст заявки уже в буфере — вставьте (⌘/Ctrl+V) и отправьте. ' : '') +
      (c.orderEmail ? 'Email: откроется письмо с краткой заявкой — прикрепите скачанный чертёж и отправьте.' : '') + '</p>';
  }

  // ---------- main render ----------
  var lastRenderedStep = -1;
  function render() {
    // progress
    var prog = $("progress");
    if (draft.step >= 1 && draft.step <= 5) {
      prog.hidden = false;
      prog.innerHTML = [1, 2, 3, 4, 5].map(function (n) {
        var cls = n < draft.step ? "done" : (n === draft.step ? "active" : "");
        return '<div class="seg ' + cls + '"></div>';
      }).join("");
    } else prog.hidden = true;

    // top actions
    var hasData = draft.step > 0 || draft.lengthCm != null;
    $("topActions").innerHTML = hasData ? '<button class="btn-ghost" data-act="resetAsk" ' + (ui.submitMode === "sending" ? "disabled" : "") + '>Очистить расчёт</button>' : "";

    // step panel
    var panel = $("stepPanel");
    var confirmReset = ui.confirmReset ? '<div class="callout danger"><p style="margin:0 0 10px">Удалить все введённые размеры и начать заново?</p><div class="btn-row"><button class="btn-ghost danger" data-act="resetYes">Да, очистить</button><button class="btn-ghost" data-act="resetNo">Отмена</button></div></div>' : "";
    var body;
    if (draft.step === 0) body = renderIntro();
    else if (draft.step === 1) body = renderBasic();
    else if (draft.step === 2) body = renderBow();
    else if (draft.step === 3) body = renderFloor();
    else if (draft.step === 4) body = renderReview();
    else body = renderOrder();
    panel.innerHTML = confirmReset + body;

    // layout / preview visibility
    var showPreview = draft.step >= 1 && draft.step <= 3;
    var layout = $("layout"), aside = $("previewAside"), mobile = $("mobilePreview"), spacer = $("mobileSpacer");
    if (showPreview) {
      layout.classList.add("two"); aside.hidden = false; mobile.classList.add("on"); spacer.hidden = false;
    } else {
      layout.classList.remove("two"); aside.hidden = true; mobile.classList.remove("on"); spacer.hidden = true;
      $("mobileBody").hidden = true; $("mobileToggle").textContent = "▲ Показать чертёж"; $("mobileToggle").setAttribute("aria-expanded", "false");
    }
    renderPreview();
    wire();

    // доступность: при смене шага переводим фокус на заголовок (скринридер объявит новый шаг)
    if (draft.step !== lastRenderedStep) {
      lastRenderedStep = draft.step;
      var heading = panel.querySelector(".step-title");
      if (heading) { heading.setAttribute("tabindex", "-1"); heading.focus({ preventScroll: true }); }
    }
  }

  // ---------- event wiring ----------
  function wire() {
    // live basic fields
    var fn = $("f-name"); if (fn) fn.addEventListener("input", function () { draft.boatName = fn.value; save(); });
    var fl = $("f-length"); if (fl) fl.addEventListener("input", function () { var v = parseCm(fl.value); if (v != null && !validateLength(v, draft.floorType)) { draft.lengthCm = v; save(); renderPreview(); } });
    var fw = $("f-width"); if (fw) fw.addEventListener("input", function () { var v = parseCm(fw.value); if (v != null && !validateWidth(v)) { draft.constantWidthCm = v; save(); renderPreview(); } });
    var fnFocus = function (h) { return function () { ui.highlight = h; renderPreview(); }; };
    var fnBlur = function () { ui.highlight = null; renderPreview(); };
    if (fl) { fl.addEventListener("focus", fnFocus({ type: "length" })); fl.addEventListener("blur", fnBlur); }
    if (fw) { fw.addEventListener("focus", fnFocus({ type: "constantWidth" })); fw.addEventListener("blur", fnBlur); }

    // bow input live warnings + preview highlight
    var bi = $("bow-input");
    if (bi) {
      var nextOffset = draft.bowWidths.length * BOW_STEP;
      ui.highlight = { type: "station", offsetCm: nextOffset };
      bi.addEventListener("input", function () {
        ui.currentRaw = bi.value; ui.currentErr = null;
        // update warnings inline without full re-render
        var box = bi.closest(".current-box");
        if (box) {
          box.querySelectorAll(".msg-warn").forEach(function (n) { n.remove(); });
          var v = parseCm(bi.value);
          if (v != null) {
            var warns = bowWarnings(v, draft.bowWidths[draft.bowWidths.length - 1], draft.constantWidthCm);
            var anchor = bi.closest(".field");
            warns.forEach(function (w) { var p = document.createElement("p"); p.className = "msg-warn"; p.textContent = "⚠️ " + w; anchor.after(p); });
          }
        }
      });
      bi.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.preventDefault(); doAddStation(); } });
      // focus & preview
      renderPreview();
      setTimeout(function () { bi.focus(); var l = bi.value.length; try { bi.setSelectionRange(l, l); } catch (e) {} }, 0);
    }

    var ei = $("edit-w");
    if (ei) { setTimeout(function () { ei.focus(); ei.select(); }, 0); ei.addEventListener("keydown", function (e) { if (e.key === "Enter") doSaveEdit(); }); }

    // contact live
    var cn = $("c-name"); if (cn) cn.addEventListener("input", function () { draft.customer.name = cn.value; save(); });
    var cp = $("c-phone"); if (cp) cp.addEventListener("input", function () { draft.customer.phone = cp.value; save(); });
    var cc = $("c-comment"); if (cc) cc.addEventListener("input", function () { draft.customer.comment = cc.value; save(); });

    // radios
    document.querySelectorAll('input[name="floor"], input[name="floor3"]').forEach(function (r) {
      r.addEventListener("change", function () { draft.floorType = r.value; save(); render(); });
    });
    var consent = $("consent"); if (consent) consent.addEventListener("change", function () { draft.dimensionsConfirmed = consent.checked; save(); render(); });

    // station hover highlight
    document.querySelectorAll(".station[data-off]").forEach(function (li) {
      li.addEventListener("mouseenter", function () { ui.highlight = { type: "station", offsetCm: Number(li.dataset.off) }; renderPreview(); });
      li.addEventListener("mouseleave", function () { ui.highlight = null; renderPreview(); });
    });

    // чертёж на экране подтверждения как сохраняемая картинка
    var orderImg = $("orderImg");
    if (orderImg) { var oo = buildOrder(); if (oo) renderPngInto(orderImg, exportSvgFile(oo)); }
  }

  // ---------- actions ----------
  function doAddStation() {
    var bi = $("bow-input"); if (!bi) return;
    var v = parseCm(bi.value);
    if (v == null) { ui.currentErr = { message: "Введите ширину в сантиметрах, например 50" }; ui.currentRaw = bi.value; render(); return; }
    var iss = validateWidth(v);
    if (iss) { ui.currentErr = iss; ui.currentRaw = bi.value; render(); return; }
    var nextOffset = draft.bowWidths.length * BOW_STEP;
    if (draft.lengthCm && nextOffset >= draft.lengthCm) { ui.currentErr = { message: "Носовые замеры достигли длины коврика. Нажмите «Ширина дальше не меняется»." }; render(); return; }
    draft.bowWidths.push(v); ui.currentRaw = ""; ui.currentErr = null; save(); render();
  }
  function doFixWidth() {
    // если в поле текущего замера есть несохранённое значение — не терять его
    var bi = $("bow-input");
    if (bi && bi.value.trim() !== "") {
      var cv = parseCm(bi.value);
      var iss = cv == null ? { message: "Проверьте последний замер или очистите поле" } : validateWidth(cv);
      if (iss) { ui.currentErr = iss; ui.currentRaw = bi.value; render(); return; }
      var nextOffset = draft.bowWidths.length * BOW_STEP;
      if (!(draft.lengthCm && nextOffset >= draft.lengthCm)) {
        draft.bowWidths.push(cv); ui.currentRaw = "";
      }
    }
    var last = draft.bowWidths[draft.bowWidths.length - 1];
    if (last == null) return;
    if (draft.constantWidthCm != null && last !== draft.constantWidthCm) { ui.confirmWidth = last; save(); render(); return; }
    draft.constantWidthFixed = true; draft.constantWidthCm = last; save(); goStep(3);
  }
  function doSaveEdit() {
    var ei = $("edit-w"); if (!ei || ui.editingIndex == null) return;
    var v = parseCm(ei.value);
    if (v == null || validateWidth(v)) { ui.editingIndex = null; render(); return; }
    draft.bowWidths[ui.editingIndex] = v; ui.editingIndex = null; save(); render();
  }

  document.getElementById("app").addEventListener("click", function (e) {
    var t = e.target.closest("[data-act]"); if (!t) return;
    var act = t.dataset.act;
    switch (act) {
      case "start": goStep(1); break;
      case "back0": goStep(0); break;
      case "toBow":
        ui.submitAttempted = true;
        if (validateLength(draft.lengthCm, draft.floorType) || validateWidth(draft.constantWidthCm) || !draft.floorType) { render(); focusFirstInvalidField(); return; }
        ui.submitAttempted = false; goStep(2); break;
      case "back1": goStep(1); break;
      case "addStation": doAddStation(); break;
      case "fixWidth": doFixWidth(); break;
      case "confirmWidthYes": draft.constantWidthFixed = true; draft.constantWidthCm = ui.confirmWidth; ui.confirmWidth = null; save(); goStep(3); break;
      case "confirmWidthNo": ui.confirmWidth = null; render(); break;
      case "editStation": ui.editingIndex = Number(t.dataset.i); render(); break;
      case "saveEdit": doSaveEdit(); break;
      case "removeLast": draft.bowWidths.pop(); ui.currentErr = null; save(); render(); break;
      case "restartAsk": ui.confirmRestart = true; render(); break;
      case "restartYes": resetAll(); break;
      case "restartNo": ui.confirmRestart = false; render(); break;
      case "back2": goStep(2); break;
      case "toReview": if (draft.floorType) goStep(4); break;
      case "back3": goStep(3); break;
      case "edit1": goStep(1); break;
      case "edit2": goStep(2); break;
      case "edit3": goStep(3); break;
      case "toOrder": if (draft.dimensionsConfirmed) goStep(5); break;
      case "back4": goStep(4); break;
      case "submit": doSubmit(); break;
      case "tg": { var otg = buildOrder(); if (otg) copyOrderTextSilently(otg, ui.orderNumber || ui.pendingOrderNumber); break; } // ссылка откроет чат сама, текст уже в буфере
      case "copyText": { var oc = buildOrder(); if (oc) doCopy(t, orderText(oc), "📋 Скопировать текст заявки"); break; }
      case "dlSvg": { var os = buildOrder(); if (os) download("kovrik-" + (ui.orderNumber || os.id) + ".svg", "image/svg+xml", exportSvgFile(os)); break; }
      case "dlJson": { var od = buildOrder(); if (od) download("kovrik-" + (ui.orderNumber || od.id) + ".json", "application/json", orderJson(od)); break; }
      case "newOrder": resetAll(); break;
      case "resetAsk": if (ui.submitMode !== "sending") { ui.confirmReset = true; render(); } break;
      case "resetYes": if (ui.submitMode !== "sending") resetAll(); break;
      case "resetNo": ui.confirmReset = false; render(); break;
    }
  });

  function doSubmit() {
    if (ui.submitMode === "sending") return; // защита от двойной отправки
    var errors = {};
    var customerName = draft.customer.name.trim();
    var customerPhone = draft.customer.phone.trim();
    var customerComment = (draft.customer.comment || "").trim();
    var controlChars = /[\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/;
    if (customerName === "") errors.name = "Укажите имя";
    else if (Array.from(customerName).length > 120 || controlChars.test(customerName)) errors.name = "Имя должно быть не длиннее 120 символов";
    if (customerPhone === "") errors.phone = "Укажите телефон";
    else {
      var phoneDigits = customerPhone.replace(/\D/g, "");
      if (phoneDigits.length < 7 || phoneDigits.length > 15 || !/^[+()\d\s.-]+$/.test(customerPhone)) errors.phone = "Проверьте формат телефона";
    }
    if (Array.from(customerComment).length > 2000 || controlChars.test(customerComment)) errors.comment = "Комментарий должен быть не длиннее 2000 символов";
    if (Array.from((draft.boatName || "").trim()).length > 160) errors.form = "Название лодки должно быть не длиннее 160 символов.";
    draft.customer.name = customerName;
    draft.customer.phone = customerPhone;
    draft.customer.comment = customerComment;
    save();
    var readiness = orderReadiness(draft);
    var o = buildOrder();
    if (o && Array.from(orderText(o, ui.pendingOrderNumber || o.id)).length > 4000) errors.form = "Заявка получилась слишком длинной для мессенджеров. Сократите комментарий или обратитесь к менеджеру в Telegram.";
    ui.contactErr = errors;
    if (Object.keys(errors).length > 0 || !readiness.ready || !o || !o.parts.supported) { ui.submitMode = null; render(); focusFirstInvalidField(); return; }

    // номер брони (idempotency по draft.id) — резервируется один раз, показывается только после успеха/подготовки
    var submittedDraftId = draft.id;
    var key = "boat-mat-submitted";
    var submitted = {};
    try { submitted = JSON.parse(localStorage.getItem(key) || "{}"); } catch (e) {}
    if (!submitted || typeof submitted !== "object" || Array.isArray(submitted)) submitted = {};
    var deterministicNumber = "BM-" + submittedDraftId.replace(/^draft-/, "").toUpperCase();
    var orderNumber = ui.pendingOrderNumber || submitted[submittedDraftId] || deterministicNumber;
    submitted[submittedDraftId] = orderNumber;
    try { localStorage.setItem(key, JSON.stringify(submitted)); } catch (e) {}
    ui.pendingOrderNumber = orderNumber;

    var endpoint = orderEndpoint();
    if (!endpoint) {
      // Честный режим без бэкенда: заявка ПОДГОТОВЛЕНА (не «отправлена»). Текст кладём в буфер для Telegram.
      ui.orderNumber = orderNumber;
      ui.submitMode = "prepared";
      copyOrderTextSilently(o);
      render();
      return;
    }

    // Реальная отправка на настроенный endpoint
    ui.submitMode = "sending";
    render();
    var payload = orderPayload(o, orderNumber);
    payload.plainText = orderText(o, orderNumber);
    payload.svg = exportSvgFile(o);
    payload.idempotencyKey = submittedDraftId;
    window.OrderSubmission.submitOrder(endpoint, payload, { timeoutMs: 20000 }).then(function (res) {
      if (draft.id !== submittedDraftId) return;
      if (res && res.success) {
        ui.orderNumber = res.orderNumber || orderNumber;
        ui.submitChannels = res.channels || ui.submitChannels;
        if (res.orderNumber) { submitted[submittedDraftId] = res.orderNumber; try { localStorage.setItem(key, JSON.stringify(submitted)); } catch (e) {} }
        ui.submitMode = "sent";
      } else {
        if (res && res.channels) ui.submitChannels = res.channels;
        if (res && res.field === "customer.name") ui.contactErr.name = "Проверьте имя";
        else if (res && res.field === "customer.phone") ui.contactErr.phone = "Проверьте формат телефона";
        else if (res && res.field === "customer.comment") ui.contactErr.comment = "Проверьте комментарий";
        if (res && ["invalid-field", "unknown-field", "unsupported-schema", "confirmation-required", "site-origin-mismatch"].indexOf(res.message) >= 0) {
          ui.contactErr.form = "Сервис отклонил данные заявки. Проверьте отмеченные поля и попробуйте ещё раз.";
        }
        if (res && res.message === "idempotency-conflict") {
          ui.contactErr.form = "Данные изменились после первой попытки отправки. Начните новый расчёт, чтобы оформить их как отдельную заявку.";
        }
        ui.submitMode = "error"; // ui.orderNumber не выставлен → остаётся форма с сообщением об ошибке
      }
      render();
      if (!res || !res.success) focusFirstInvalidField();
    });
  }
  function copyOrderTextSilently(o, explicitOrderNumber) {
    try {
      var txt = orderText(o, explicitOrderNumber);
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).catch(function () {});
    } catch (e) {}
  }
  function doCopy(btn, text, label) {
    function done() { btn.textContent = "✓ Скопировано"; setTimeout(function () { btn.textContent = label; }, 2000); }
    function fallback() {
      // резервный способ, если Clipboard API недоступен (напр. без https)
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      ta.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    } else fallback();
  }

  // warn before leaving with unfinished data
  window.addEventListener("beforeunload", function (e) {
    if (draft.step > 0 && draft.step < 5 && !ui.orderNumber && (draft.lengthCm != null || draft.bowWidths.length > 0)) {
      e.preventDefault(); e.returnValue = "";
    }
  });

  render();
})();
</script>
</body>
</html>
